<style>
/* ===================== Wise Old Man OS — self-contained styles ===================== */
:root{
  --ink-950:#070910; --ink-900:#0b0e14; --ink-850:#10141d; --ink-800:#151a24;
  --ink-700:#1d2430; --ink-600:#283041; --ink-500:#3a4456;
  --line:#222a38; --mut:#8a94a6; --text:#e7ebf2;
  --accent:#34d399; /* swapped by scope */
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  background:var(--ink-950); color:var(--text);
  font-family:'Inter',ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  -webkit-font-smoothing:antialiased; font-size:14px;
}
button{font-family:inherit; cursor:pointer; border:0; background:none; color:inherit}
input,select{font-family:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--ink-600);border-radius:6px}
::-webkit-scrollbar-track{background:transparent}
.tnum{font-variant-numeric:tabular-nums}
.app{height:100%;display:flex}
.content{flex:1;display:flex;flex-direction:column;min-width:0}
.wrap{max-width:1360px;margin:0 auto;width:100%}
.fade{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* top bar */
.topbar{display:flex;align-items:center;gap:14px;padding:10px 20px;border-bottom:1px solid var(--line);
  background:rgba(7,9,16,.8);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20}
.wm{display:flex;align-items:center;gap:10px;user-select:none}
.wm .glyph{width:36px;height:36px;border-radius:12px;display:grid;place-items:center;font-weight:900;
  color:var(--ink-950);background:var(--accent);box-shadow:0 0 18px color-mix(in srgb,var(--accent) 35%,transparent)}
.wm .name{font-weight:600;letter-spacing:-.01em;font-size:15px;line-height:1.1}
.wm .sub{font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--mut)}
.nav{display:flex;align-items:center;gap:4px;margin-left:14px}
.nav button{font-size:13px;padding:6px 12px;border-radius:8px;color:var(--mut)}
.nav button:hover{color:#fff}
.nav button.on{background:var(--ink-800);color:#fff}
.right{margin-left:auto;display:flex;align-items:center;gap:8px}
.toggle{display:flex;align-items:center;background:var(--ink-850);border:1px solid var(--line);border-radius:999px;padding:2px}
.toggle button{font-size:12px;padding:4px 12px;border-radius:999px;color:var(--mut);text-transform:capitalize}
.toggle button.on{color:var(--ink-950);font-weight:600}
.badge{font-size:10px;padding:4px 8px;border-radius:6px;border:1px solid var(--line);color:var(--mut)}

/* sidebar (desktop ≥1024) */
.sidebar{display:none;flex-direction:column;width:224px;flex:0 0 224px;height:100%;gap:12px;
  padding:16px 12px;border-right:1px solid var(--line);background:var(--ink-950)}
.sidebar .wm{padding:4px 8px}
.snav{display:flex;flex-direction:column;gap:2px;margin-top:6px}
.snav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;font-size:13px;
  padding:9px 12px;border-radius:9px;color:var(--mut)}
.snav button:hover{color:#fff;background:var(--ink-850)}
.snav button.on{background:var(--ink-800);color:#fff}
.snav .ic{width:7px;height:7px;border-radius:2px;background:currentColor;opacity:.6;flex:0 0 auto}
.sidefoot{margin-top:auto;display:flex;flex-direction:column;gap:10px;padding:8px}
.sidefoot .toggle{width:100%;justify-content:center}

/* input affordances */
button:focus-visible,input:focus-visible,select:focus-visible,[tabindex]:focus-visible{
  outline:2px solid var(--accent);outline-offset:2px;border-radius:8px}
.tile{transition:border-color .12s ease,transform .12s ease,box-shadow .12s ease}
.tile:hover{border-color:var(--ink-600);transform:translateY(-1px);
  box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 12px 28px rgba(0,0,0,.45)}
.card,.mini,.chip,.nav button,.snav button{transition:all .12s ease}

main{flex:1;overflow-y:auto;padding:16px 20px}

/* grid + tiles */
.grid{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:12px}
.tile{background:var(--ink-900);border:1px solid var(--line);border-radius:16px;padding:16px;
  box-shadow:0 1px 0 rgba(255,255,255,.03) inset,0 8px 24px rgba(0,0,0,.35);display:flex;flex-direction:column;min-height:0}
.tile h3{margin:0 0 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.14em;color:var(--mut)}
.tile .head{display:flex;align-items:center;justify-content:space-between}
.tile .head h3{margin:0}
.col-4{grid-column:span 4} .col-8{grid-column:span 8} .col-5{grid-column:span 5}
.col-6{grid-column:span 6} .col-7{grid-column:span 7} .col-12{grid-column:span 12}
.hero{grid-column:span 8;background:linear-gradient(135deg,var(--ink-850),var(--ink-900));
  border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,.35)}

.pill{font-size:10px;padding:2px 6px;border-radius:6px;font-weight:500}
.mut{color:var(--mut)} .small{font-size:11px} .xs{font-size:10px}
.row{display:flex;align-items:center;gap:10px}
.spaced{display:flex;align-items:center;justify-content:space-between}
.dot{width:6px;height:6px;border-radius:999px;display:inline-block}
.dot2{width:8px;height:8px;border-radius:999px;display:inline-block;flex:0 0 auto}

.card{background:var(--ink-850);border:1px solid var(--line);border-radius:12px;padding:12px}
.card:hover{border-color:var(--ink-500)}
.btn-acc{background:var(--accent);color:var(--ink-950);font-weight:600;border-radius:8px;padding:6px 10px;font-size:11px;width:100%}
.btn-acc:active{transform:scale(.98)}
.btn-ghost{border:1px solid var(--line);color:var(--mut);border-radius:8px;padding:4px 8px;font-size:11px}
.btn-ghost:hover{color:#fff}

.sug-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.list>*{margin-bottom:6px} .list>*:last-child{margin-bottom:0}
.mini{background:var(--ink-850);border:1px solid var(--line);border-radius:10px;padding:8px 10px}

input.field,select.field{background:var(--ink-850);border:1px solid var(--line);border-radius:8px;
  padding:6px 10px;color:var(--text);font-size:12px;outline:none}
input.field:focus,select.field:focus{border-color:var(--ink-500)}

/* tasks table */
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{text-align:left;font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.04em;
  color:var(--mut);padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
tbody td{padding:8px 10px;border-bottom:1px solid var(--ink-850);vertical-align:middle}
tbody tr:hover{background:rgba(16,20,29,.6)}
.spine{border-left:4px solid var(--c)}
.strike{text-decoration:line-through;color:var(--mut)}
.tasktable-wrap{background:var(--ink-900);border:1px solid var(--line);border-radius:16px;overflow:hidden}
.chip{font-size:12px;padding:4px 12px;border-radius:999px;border:1px solid var(--line);color:var(--mut)}
.chip.on{color:var(--ink-950);font-weight:600}
.taskcards{display:none}

/* histogram */
.bars{display:flex;align-items:flex-end;gap:4px;height:48px}
.bars .b{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bars .b .fill{width:100%;border-radius:3px 3px 0 0}
.barlabel{font-size:8px;color:var(--mut)}
.meter{height:8px;border-radius:999px;background:var(--ink-700);overflow:hidden;margin-bottom:4px}
.meter .fill{height:100%;border-radius:999px;background:var(--accent)}

/* console */
.console{border-top:1px solid var(--line);background:rgba(7,9,16,.92);backdrop-filter:blur(8px);padding:8px 20px}
.console .log{max-height:112px;overflow-y:auto;margin-bottom:6px;display:flex;flex-direction:column;gap:4px}
.console .line{font-size:11px;display:flex;gap:8px}
.console form{display:flex;align-items:center;gap:8px}
.console input{flex:1;background:none;border:0;outline:none;color:var(--text);font-size:13px;padding:6px 0}
.mic{width:32px;height:32px;display:grid;place-items:center;border:1px solid var(--line);border-radius:8px;color:var(--mut)}
.mic:hover{color:#fff}
.send{padding:0 12px;height:32px;border-radius:8px;background:var(--accent);color:var(--ink-950);font-weight:600;font-size:12px}

/* mobile nav + toast */
.mnav{display:none;border-top:1px solid var(--line);background:var(--ink-950)}
.mnav button{flex:1;padding:8px;font-size:11px;color:var(--mut)}
.mnav button.on{color:#fff}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:30;background:var(--ink-800);
  border:1px solid var(--line);border-radius:12px;padding:8px 16px;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.4)}

/* responsive */
/* desktop ≥1024: sidebar replaces the top bar */
@media(min-width:1024px){
  .content>.topbar{display:none}
  .sidebar{display:flex}
  main{padding:20px 28px}
}
/* tablet 768-1023: 2-up tiles, top bar keeps horizontal nav */
@media(max-width:1023px){
  .col-4,.col-5,.col-6,.col-7{grid-column:span 6}
  .col-8,.hero{grid-column:span 12}
}
/* mobile <768: single column, cards, bottom nav */
@media(max-width:767px){
  .nav{display:none} .mnav{display:flex} .sug-grid{grid-template-columns:1fr}
  .col-4,.col-5,.col-6,.col-7,.col-8,.hero{grid-column:span 12}
  .tasktable-wrap{display:none} .taskcards{display:block}
  main{padding:12px}
}
</style>

var RISK_TODAY=new Date(2026,5,25);
var RISK_COLOR={red:'#ef4444',amber:'#eab308',green:'#22c55e',done:'#3a4456'};
function parseMD(s){if(!s)return null;var p=String(s).split('/');if(p.length<2)return null;return new Date(2026,(+p[0])-1,+p[1]);}
function maxBand(a,b){var o=['green','amber','red'];return o.indexOf(a)>=o.indexOf(b)?a:b;}
function riskOf(t){
  if(t.status==='completed')return {band:'done',reason:'completed',bang:false};
  var due=parseMD(t.due), fu=parseMD(t.followup);
  var dtd=due?Math.round((due-RISK_TODAY)/86400000):null;
  var dpf=fu?Math.round((RISK_TODAY-fu)/86400000):null;
  var band='green',r=[];
  if(dtd!=null){
    if(dtd<0){band='red';r.push('overdue '+(-dtd)+'d');}
    else if(dtd<=1){band='red';r.push('due now');}
    else if(dtd<=2){band='red';r.push('due in '+dtd+'d');}
    else if(dtd<=5){band=maxBand(band,'amber');r.push('due in '+dtd+'d');}
  }
  if(dpf!=null&&dpf>0){band=maxBand(band,dpf>=3?'red':'amber');r.push((t.ball_in_court!=='Me'?'waiting on '+t.ball_in_court:'follow-up')+' '+dpf+'d past');}
  if(t.status==='blocked'&&band==='green'){band='amber';r.push('blocked');}
  return {band:band,reason:r.join(', ')||'on track',bang:band==='red'};
}

function tasks(){

    if(S.filter==='all')return true;
    if(S.filter==='mine')return t.ball_in_court==='Me'&&t.status!=='completed';
    return t.action===S.filter;
  });
  var opts=Object.keys(ACTION_LABEL).map(function(k){return '<option value="'+k+'">'+ACTION_LABEL[k]+'</option>'}).join('');
  var chips=FILTERS.map(function(f){
    var on=S.filter===f[0]; var extra=(f[0]!=='all'&&f[0]!=='mine')?' <span style="color:'+(on?'#000':ACTION_SPINE[f[0]])+'">●</span>':'';
    return '<button class="chip '+(on?'on':'')+'" data-filter="'+f[0]+'" style="'+(on?'background:'+a+';border-color:'+a:'')+'">'+f[1]+extra+'</button>';
  }).join('');
  var head=['!','Description','Start','Follow-up','Due','Owner','Ball in Court','Category','Subcategory','Action','Status','Risk'].map(function(x){return '<th>'+x+'</th>'}).join('');
  var body=rows.map(function(t){
    var bic=t.ball_in_court==='Me'?'<b style="color:'+a+'">Me</b>':'<span class="mut">'+esc(t.ball_in_court)+'</span>';
    var rk=riskOf(t); var bang=rk.bang?'!':t.bang;
    var dueColor=rk.band==='red'?RISK_COLOR.red:rk.band==='amber'?RISK_COLOR.amber:'inherit';
    return '<tr><td class="spine" style="--c:'+ACTION_SPINE[t.action]+';padding-left:0"><span style="padding-left:8px;font-weight:700;color:#ef4444">'+esc(bang)+'</span></td>'+
      '<td style="max-width:280px"><span class="'+(t.status==='completed'?'strike':'')+'">'+esc(t.description)+'</span></td>'+
      '<td class="mut tnum">'+esc(t.start)+'</td><td class="mut tnum">'+esc(t.followup||'—')+'</td><td class="tnum" style="color:'+dueColor+'">'+esc(t.due||'—')+'</td>'+
      '<td class="mut">'+esc(t.owner)+'</td><td>'+bic+'</td><td class="mut">'+esc(t.category)+'</td><td class="mut">'+esc(t.subcategory||'—')+'</td>'+
      '<td><span style="color:'+ACTION_SPINE[t.action]+'"><span class="dot" style="background:'+ACTION_SPINE[t.action]+'"></span> '+ACTION_LABEL[t.action]+'</span></td>'+
      '<td><span class="mut"><span class="dot" style="background:'+STATUS[t.status].dot+'"></span> '+STATUS[t.status].label+'</span></td>'+
      '<td><span class="dot2" title="'+esc(rk.reason)+'" style="background:'+RISK_COLOR[rk.band]+';box-shadow:0 0 6px '+RISK_COLOR[rk.band]+'"></span></td></tr>';
  }).join('');
  var cards=rows.map(function(t){
    var bic=t.ball_in_court==='Me'?'<b style="color:'+a+'">Me</b>':'<span class="mut">'+esc(t.ball_in_court)+'</span>';
    var rk=riskOf(t); var bang=rk.bang?'!':t.bang;
    return '<div class="card spine" style="--c:'+ACTION_SPINE[t.action]+';margin-bottom:8px;position:relative">'+
      '<span class="dot2" title="'+esc(rk.reason)+'" style="position:absolute;top:12px;right:12px;background:'+RISK_COLOR[rk.band]+';box-shadow:0 0 6px '+RISK_COLOR[rk.band]+'"></span>'+
      '<div class="row" style="gap:6px;padding-right:16px">'+(bang?'<b style="color:#ef4444">!</b>':'')+'<span style="font-size:13px;font-weight:500" class="'+(t.status==='completed'?'strike':'')+'">'+esc(t.description)+'</span></div>'+
      '<div class="xs mut tnum" style="display:flex;flex-wrap:wrap;gap:4px 12px;margin-top:4px"><span style="color:'+(rk.band==='red'?RISK_COLOR.red:rk.band==='amber'?RISK_COLOR.amber:'inherit')+'">Due '+esc(t.due||'—')+'</span><span>F/U '+esc(t.followup||'—')+'</span><span>'+esc(t.category)+(t.subcategory?' · '+esc(t.subcategory):'')+'</span></div>'+

    '<div class="tasktable-wrap"><table><thead><tr>'+head+'</tr></thead><tbody>'+body+'</tbody></table></div>'+
    '<div class="taskcards">'+cards+'</div></div>';

    '<button type="button" class="mic" data-mic="1" title="Voice (placeholder)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 17v4"/></svg></button>'+
    '<button class="send">Send</button></form></div></div>';
}
function toast(){return '<div class="toast">'+esc(S.toast)+'</div>'}

/* ============================ EVENTS ============================ */
function wire(){
  // nav + scope (event delegation handles dynamic content)
}
document.addEventListener('click',function(e){
  var el=e.target.closest('[data-view]'); if(el){S.view=el.getAttribute('data-view');render();return;}
  var sc=e.target.closest('[data-scope]'); if(sc){S.scope=sc.getAttribute('data-scope');render();return;}
  var ft=e.target.closest('[data-filter]'); if(ft){S.filter=ft.getAttribute('data-filter');render();return;}
  var ac=e.target.closest('[data-act="toast"]'); if(ac){showToast(ac.getAttribute('data-msg'));return;}
  var mic=e.target.closest('[data-mic]'); if(mic){say('you','🎙️ (voice input placeholder)');sayBot();render();return;}
});
document.addEventListener('submit',function(e){
  var f=e.target;
  if(f.getAttribute('data-console')){e.preventDefault();var v=f.msg.value.trim();if(v){say('you',v);sayBot();f.reset();render();}return;}
  if(f.getAttribute('data-cap')){e.preventDefault();var v=f.cap.value.trim();if(v){showToast('Captured: '+v);}f.reset();return;}
  if(f.getAttribute('data-add')){e.preventDefault();var d=f.desc.value.trim();if(d){
    S.extra[S.scope].unshift({id:'new-'+Date.now(),bang:'',description:d,start:'06/25',followup:'',due:'',owner:'Gavin',ball_in_court:'Me',category:'Inbox',subcategory:'',action:f.act.value,status:'not_started'});
    showToast('Added (mock write → sheet): '+d);}f.reset();render();return;}
});
function say(who,text){S.log.push({who:who,text:text})}
function sayBot(){S.log.push({who:'WOM',text:'Got it — in mock mode I only simulate actions. Wire creds (see NEEDS-FROM-YOU.md) to go live.'})}
var toastTimer;
function showToast(msg){
  S.toast=msg; S.log.push({who:'WOM',text:'✓ '+msg+' (mock — nothing left the machine)'}); render();
  clearTimeout(toastTimer); toastTimer=setTimeout(function(){S.toast=null;render();},2600);
}

/* ============================ BOOT ============================ */
render();
if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){
  navigator.serviceWorker.register('/preview/sw.js').catch(function(){});
}
