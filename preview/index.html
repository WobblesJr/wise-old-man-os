.qamenu{position:absolute;right:0;top:36px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(54,48,42,.12);padding:6px;min-width:170px;z-index:40;display:none}

.body{flex:1;display:flex;min-height:0}
.nav{width:212px;flex:0 0 212px;background:var(--rail);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:var(--s12) var(--s8)}
.eb{font-size:10.5px;text-transform:uppercase;letter-spacing:.13em;color:var(--mut);padding:var(--s16) var(--s12) var(--s4)}
.nrow{display:flex;align-items:center;gap:9px;padding:7px var(--s12);border-radius:8px;cursor:pointer;color:var(--mut);font-size:13px;transition:background-color .14s ease,color .14s ease}
.nrow:hover{background:var(--s2);color:var(--ink)}
.nrow.on{background:var(--railA);color:var(--ink);font-weight:500}
.nrow.sub{padding-left:24px;font-size:12.5px}
.nrow .ic{width:18px;text-align:center;color:var(--mut)}
.nrow .av{width:20px;height:20px;border-radius:6px;display:grid;place-items:center;font-size:10px;font-weight:600;background:var(--s2);color:var(--mut);flex:0 0 auto}
.nrow .av.h{background:var(--clay);color:#fff}
.nrow .lbl{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nrow .dot{width:6px;height:6px;border-radius:50%}
.nfoot{margin-top:auto;padding:var(--s12);border-top:1px solid var(--border);color:var(--mut);font-size:12px;display:flex;align-items:center;gap:8px}
.more .nrow{color:var(--mut)}
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.pane{flex:1;overflow-y:auto;padding:var(--s24)}
.pane.flush{padding:0}
.pane.tasks{padding:var(--s20) var(--s24)}

.eye{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);margin-bottom:3px}
.deep{font-size:12px;color:var(--clay);text-decoration:none;cursor:pointer;background:none;border:0;padding:0}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:var(--s20)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:var(--s16)}
.stat{font-size:26px;font-weight:600;line-height:1}

.hero{grid-column:1/-1;border-left:3px solid var(--clay)}
.cta{background:var(--clay);color:#fff;border:0;border-radius:8px;font-size:12px;font-weight:600;padding:7px 14px;cursor:pointer}
.gbtn{background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:12px;font-weight:600;padding:7px 12px;cursor:pointer;color:var(--ink)}
.wbpips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}

.hermes-strip{margin-top:12px;background:var(--claySoft);border:1px solid var(--border);border-left:3px solid var(--clay);border-radius:10px;padding:10px 12px}

.fchip.on{background:var(--clay);color:#fff;border-color:transparent}
.gridwrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.gscroll{overflow:auto;max-height:60vh}
table.led{width:100%;border-collapse:separate;border-spacing:0;font-size:12px}
.led th{position:sticky;top:0;background:var(--s2);text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);font-weight:600;padding:7px 9px;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;z-index:2}
.led td{padding:0;border-bottom:1px solid var(--gl);border-right:1px solid var(--gl);white-space:nowrap;vertical-align:middle}

.gcell{padding:6px 9px}
.gedit{outline:none;cursor:text;padding:6px 9px}

.led td.wrapcell{white-space:normal;line-height:1.4}
.gsel{appearance:none;border:0;background:transparent;font:inherit;font-size:12px;color:var(--ink);padding:6px 9px;width:100%;cursor:pointer;outline:none}

.led input.gin{width:100%;border:0;background:#FFF8E8;font:inherit;font-size:12px;color:var(--ink);outline:none;padding:6px 9px}

.notes{display:flex;height:100%;min-height:0}

.resizer.row{flex-basis:8px;cursor:row-resize;width:100%}
.resizer.row::after{left:0;right:0;top:3px;bottom:auto;height:1px;width:auto}

.inkwrap{flex:1;min-height:120px;display:flex;flex-direction:column;padding:0 var(--s16) var(--s16)}

.nedbody.mtype .resizer.row,.nedbody.mtype .inkwrap{display:none}
.nedbody.mtype .ntext{flex:1 1 auto;height:auto!important}
.nedbody.mink .resizer.row,.nedbody.mink .ntext{display:none}
.nedbody.mink .inkwrap{flex:1 1 auto}
.inkpad{flex:1;border:1px dashed var(--border);border-radius:8px;background:repeating-linear-gradient(transparent,transparent 27px,#EFE7D8 28px);min-height:120px;position:relative;overflow:hidden}

.note-item{padding:12px;border-bottom:1px solid var(--gl);cursor:pointer}
.note-item.on{background:var(--s2)}
.focusbtn{margin-left:auto}

.fade{animation:wpf .2s cubic-bezier(.22,.61,.36,1)}
@keyframes wpf{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.caret{display:inline-block;width:2px;height:14px;background:var(--clay);vertical-align:-2px;margin-left:1px;animation:wcar 1s step-end infinite}@keyframes wcar{50%{opacity:0}}
/* mobile */
.mnav{display:none}

  .nav{width:176px;flex-basis:176px}
  .notes .nfolders,.notes .resizer[data-resize="folders"]{display:none}

  .grid2{grid-template-columns:1fr}
  .ws{flex-direction:column}.ws .conv{border-right:0;border-bottom:1px solid var(--border)}
  .ws .art{min-height:42vh}
  .nfolders.hide-m,.nlist.hide-m{display:none}
  .notes .resizer[data-resize]{display:none}      /* hide column resizers, keep the ink row-resizer */
  .fchip{min-height:34px;padding:7px 12px}
}
.notes.focus .nfolders,.notes.focus .nlist,.notes.focus .resizer[data-resize]{display:none}
.toast{position:fixed;bottom:calc(74px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--ink);color:#FAF6EE;border-radius:10px;padding:9px 15px;font-size:12px;z-index:60;box-shadow:0 8px 24px rgba(0,0,0,.2)}
</style>

var TODAY=new Date(2026,5,28);
function parseMD(s){if(!s)return null;var m=(''+s).split('/');if(m.length<2)return null;return new Date(2026,parseInt(m[0],10)-1,parseInt(m[1],10));}
function riskOf(t){
  if(t.status==='completed')return{band:'done',reason:'completed'};
  var due=parseMD(t.due),fu=parseMD(t.followup);
  var dtd=due?Math.round((due-TODAY)/86400000):null;
  var dpf=fu?Math.round((TODAY-fu)/86400000):null;
  var band='green',r=[];
  if(dtd!=null){if(dtd<0){band='red';r.push('overdue '+(-dtd)+'d');}else if(dtd<=2){band='red';r.push('due in '+dtd+'d');}else if(dtd<=5){band='amber';r.push('due in '+dtd+'d');}}
  if(dpf!=null&&dpf>0){band=maxB(band,dpf>=3?'red':'amber');r.push((t.ball_in_court!=='Me'?'waiting on '+t.ball_in_court:'follow-up')+' '+dpf+'d');}
  if(t.status==='blocked'&&band==='green'){band='amber';r.push('blocked');}
  return{band:band,reason:r.join(', ')||'on track',dtd:dtd};
}
function maxB(a,b){var o=['green','amber','red'];return o.indexOf(a)>=o.indexOf(b)?a:b;}
function scoreOf(t){var b={red:100,amber:50,green:10,done:0}[riskOf(t).band]||0;var d=parseMD(t.due);if(d)b+=Math.max(0,30-Math.round((d-TODAY)/86400000));return b;}
function prioOf(t){
  if(t._prio!=null)return{level:t._prio,src:'you'};
  if(MOCK.prio[t.id]!=null)return{level:MOCK.prio[t.id],src:'hermes'};
  var lvl={red:4,amber:3,green:1,done:0}[riskOf(t).band];return{level:lvl==null?2:lvl,src:'rules'};
}

function gridSort(rows){

    if(col==='prio'){va=prioOf(a).level;vb=prioOf(b).level;}

    else{va=(''+(a[col]||'')).toLowerCase();vb=(''+(b[col]||'')).toLowerCase();}
    return va<vb?-1*dir:va>vb?1*dir:0;});
}
function gcell(t,c){
  var e=effTask(t),key=c[0],type=c[3];
  if(type==='prio'){var p=prioOf(e);var po=[0,1,2,3,4].map(function(n){return '<option value="'+n+'"'+(n===p.level?' selected':'')+'>P'+n+'</option>';}).join('');

  var txtH=S.nSizes.ink||220;
  var editor='<div class="nedhd"><div class="serif" style="font-size:16px;font-weight:600">'+esc(cur[0])+'</div>'+
    '<div class="seg" style="margin-left:auto">'+modes+'</div>'+
    '<button class="gbtn focusbtn" id="notesFocus">'+(S.notesFocus?'Exit focus':'Focus')+'</button></div>'+
    '<div class="nedbody m'+S.noteMode+'" id="nedbody">'+
      '<div class="ntext" id="ntext" contenteditable="true" data-note-idx="'+S.noteIdx+'" style="height:'+txtH+'px">'+esc(cur[3])+'</div>'+
      '<div class="resizer row" id="inkResizer" title="drag to resize the canvas"></div>'+
      '<div class="inkwrap"><div class="xs muted" style="margin-bottom:6px">Apple Pencil canvas</div><div class="inkpad"><svg width="100%" height="100%" viewBox="0 0 360 150" preserveAspectRatio="none"><path d="M16 40 C 60 18, 90 70, 130 44 S 210 20, 250 48 S 320 30, 344 52" fill="none" stroke="var(--clay)" stroke-width="2" stroke-linecap="round"/><path d="M20 96 C 70 80, 120 110, 180 92" fill="none" stroke="var(--ink)" stroke-width="2" stroke-linecap="round"/></svg></div></div>'+
    '</div>'+
    '<div class="nedfoot">✓ Saved to Obsidian · 10-wiki/'+S.noteFolder+'/'+esc(cur[0].toLowerCase().replace(/[^a-z0-9]+/g,'-'))+'.md</div>';
  return '<div class="notes'+(S.notesFocus?' focus':'')+'" id="notesRoot">'+
    '<div class="nfolders ncol hide-m" id="nfolders" style="'+pw(S.nSizes.folders)+'">'+folders+'</div>'+
    '<div class="resizer" data-resize="folders"></div>'+
    '<div class="nlist ncol hide-m" id="nlist" style="'+pw(S.nSizes.list)+'">'+listH+'</div>'+
    '<div class="resizer" data-resize="list"></div>'+
    '<div class="neditor ncol">'+editor+'</div></div>';
}

/* ===================== RENDER ===================== */
var VIEWS={dashboard:dashboard,tasks:tasks,workspace:workspace,cockpit:cockpit,notes:notes};
function render(anim){
  document.getElementById('app').innerHTML=shell();
  paintPane(anim);
}
function paintPane(anim){
  var pane=document.getElementById('pane');if(!pane)return;
  pane.className='pane'+(S.view==='tasks'?' tasks':'')+((S.view==='workspace'||S.view==='notes')?' flush':'');
  pane.innerHTML=VIEWS[S.view]();
  if(anim){pane.classList.remove('fade');void pane.offsetWidth;pane.classList.add('fade');}
  bind();
  if(S.view==='tasks')wireTasks();
  if(S.view==='notes')wireNotes();
  if(S.view==='workspace'){var tr=document.getElementById('trans');if(tr)tr.scrollTop=tr.scrollHeight;}
}
/* repaint only the active pane — keeps focus/caret/scroll in the shell, used for in-view updates */
function repaint(){paintPane(false);}
function isEditing(){var a=document.activeElement;return !!a&&(a.tagName==='INPUT'||a.isContentEditable);}
function go(v,a){S.view=v;if(a)S.agent=a;render(true);}
function bind(){
  document.querySelectorAll('[data-view]').forEach(function(el){el.onclick=function(e){e.stopPropagation();go(el.getAttribute('data-view'),el.getAttribute('data-agent')||null);};});
  document.querySelectorAll('[data-scope]').forEach(function(el){el.onclick=function(){S.scope=el.getAttribute('data-scope');render(true);};});
  document.querySelectorAll('[data-filter]').forEach(function(el){el.onclick=function(){S.filter=el.getAttribute('data-filter');repaint();};});
  document.querySelectorAll('[data-toast]').forEach(function(el){el.onclick=function(){toast(el.getAttribute('data-toast'));};});
  document.querySelectorAll('[data-do]').forEach(function(el){el.onclick=function(){
    var t=findTask(el.getAttribute('data-do')),e=t?effTask(t):null;
    if(e&&e.ball_in_court&&e.ball_in_court!=='Me')toast('Drafted a chase to '+e.ball_in_court+' (mock) — staged in Workspace');
    else{go('tasks');toast(e?('Focused: '+e.description):'Opened');}
  };});
  var qb=document.getElementById('qaBtn');if(qb)qb.onclick=function(e){e.stopPropagation();var m=document.getElementById('qaMenu');var open=m.classList.toggle('open');qb.setAttribute('aria-expanded',open?'true':'false');};
  document.querySelectorAll('[data-qa]').forEach(function(el){el.onclick=function(){var k=el.getAttribute('data-qa');document.getElementById('qaMenu').classList.remove('open');
    if(k==='task'){S.view='tasks';render(true);setTimeout(function(){var a=document.getElementById('addRow');if(a)a.click();},60);}
    else if(k==='note'){S.view='notes';render(true);}
    else toast('Quick capture (mock) — would save to Obsidian inbox');};});
  // sort headers
  document.querySelectorAll('[data-sort]').forEach(function(el){el.onclick=function(){var k=el.getAttribute('data-sort');if(S.sortCol===k)S.sortDir=S.sortDir==='asc'?'desc':'asc';else{S.sortCol=k;S.sortDir=(k==='prio'||k==='risk')?'desc':'asc';}repaint();};});
  // workspace send
  document.querySelectorAll('[data-send]').forEach(function(el){el.onclick=sendMsg;});
  var wi=document.getElementById('wsInput');if(wi)wi.addEventListener('keydown',function(e){if(e.key==='Enter')sendMsg();});
  // ws tabs
  document.querySelectorAll('[data-wstab]').forEach(function(el){el.onclick=function(){S.wsTab=el.getAttribute('data-wstab');repaint();};});
  // notes
  document.querySelectorAll('[data-nfolder]').forEach(function(el){el.onclick=function(){S.noteFolder=el.getAttribute('data-nfolder');S.noteIdx=0;repaint();};});
  document.querySelectorAll('[data-note]').forEach(function(el){el.onclick=function(){S.noteIdx=+el.getAttribute('data-note');repaint();};});
  document.querySelectorAll('[data-ntab]').forEach(function(el){el.onclick=function(){S.noteMode=el.getAttribute('data-ntab');repaint();};});
  var nt=document.getElementById('ntext');if(nt)nt.addEventListener('input',function(){var l=MOCK.notes[S.noteFolder],i=+nt.getAttribute('data-note-idx');if(l&&l[i])l[i][3]=nt.textContent;});
  var fb=document.getElementById('notesFocus');if(fb)fb.onclick=function(){S.notesFocus=!S.notesFocus;repaint();};
}
function toast(m){var el=document.getElementById('toastEl');if(!el){el=document.createElement('div');el.id='toastEl';el.className='toast';el.setAttribute('role','status');document.body.appendChild(el);}el.textContent=m;el.style.display='block';clearTimeout(window._tt);window._tt=setTimeout(function(){el.style.display='none';},2400);}
function sendMsg(){var inp=document.getElementById('wsInput');if(!inp||!inp.value.trim())return;var v=inp.value.trim();S.log[S.agent]=(S.log[S.agent]||[]).concat([{who:'you',text:v},{who:'ag',text:'(mock) Got it — wire creds to act for real.'}]);inp.value='';repaint();}

/* tasks: add-row + inline cell editing (commits in place — never rebuilds the grid mid-edit) */
function findTask(id){var a=allTasks();for(var i=0;i<a.length;i++)if(a[i].id===id)return a[i];return null;}
function setEdit(id,field,value){
  var key=field==='prio'?'_prio':field, val=field==='prio'?parseInt(value,10):value;
  if(id.indexOf('new-')===0){var t=findTask(id);if(t)t[key]=val;return;}
  var p={};p[key]=val;S.edits[id]=Object.assign(S.edits[id]||{},p);
}
function placeCaretEnd(el){try{el.focus();var r=document.createRange();r.selectNodeContents(el);r.collapse(false);var s=getSelection();s.removeAllRanges();s.addRange(r);}catch(e){if(el)el.focus();}}
function updateRiskCell(id){
  var tr=document.querySelector('#ledBody tr[data-id="'+id+'"]'),t=findTask(id);if(!tr||!t)return;
  var e=effTask(t),r=riskOf(e),rc={red:'var(--dng)',amber:'var(--warn)',green:'var(--pos)',done:'var(--mut)'};
  var dot=tr.querySelector('td:last-child .dotg');if(dot){dot.style.background=rc[r.band];dot.title=r.reason;}
  var desc=tr.querySelector('.gedit[data-edit="description"]');if(desc)desc.classList.toggle('strike',e.status==='completed');
}
function moveCell(c,field){
  var tr=c.closest('tr'),nx=tr&&tr.nextElementSibling;c.blur();
  if(nx){var nc=nx.querySelector('.gedit[data-edit="'+field+'"]');if(nc)placeCaretEnd(nc);}
}
function wireTasks(){
  var btn=document.getElementById('addRow');if(!btn)return;
  // selects commit + repaint (no caret to lose); text cells commit in place on focusout
  document.querySelectorAll('#ledBody select.gsel[data-edit]').forEach(function(s){s.onchange=function(){commitEdit(s.getAttribute('data-id'),s.getAttribute('data-edit'),s.value);};});
  document.querySelectorAll('#ledBody .gedit[data-edit]').forEach(function(c){c.addEventListener('keydown',function(e){
    if(e.key==='Enter'){e.preventDefault();moveCell(c,c.getAttribute('data-edit'));}
    else if(e.key==='Escape'){e.preventDefault();c.blur();}
  });});
  btn.onclick=function(){
    var tb=document.getElementById('ledBody');var tr=document.createElement('tr');
    var ph=['New task…','mm/dd','mm/dd','mm/dd','Gavin','Me','Category','Sub','action','not started'];
    tr.innerHTML='<td class="gcell" style="text-align:center;border-left:4px solid var(--clay)"><span class="pl" style="background:#857C7022;color:#857C70">P—</span></td>'+
      ['description','start','followup','due','owner','ball_in_court','category','subcategory'].map(function(k,i){return '<td><input class="gin" data-k="'+k+'" placeholder="'+ph[i]+'"></td>';}).join('')+
      '<td><select class="gsel" data-k="action">'+Object.keys(ACT).map(function(k){return '<option value="'+k+'">'+ACT[k]+'</option>';}).join('')+'</select></td>'+
      '<td><select class="gsel" data-k="status">'+Object.keys(STAT).map(function(k){return '<option value="'+k+'">'+STAT[k]+'</option>';}).join('')+'</select></td>'+
      '<td class="gcell" style="text-align:center"><span class="dotg" style="background:var(--mut)"></span></td>';
    tb.appendChild(tr);
    var fields=tr.querySelectorAll('[data-k]');fields[0].focus();
    fields.forEach(function(f){f.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();commitNewRow(tr,fields);}});});
    tr.scrollIntoView({block:'nearest'});
  };
}
function commitNewRow(tr,fields){
  var o={};fields.forEach(function(f){o[f.getAttribute('data-k')]=f.value;});
  if(!(o.description||'').trim()){tr.remove();return;}
  var t={id:'new-'+Date.now(),bang:'',description:o.description,start:o.start||'',followup:o.followup||'',due:o.due||'',owner:o.owner||'Gavin',ball_in_court:o.ball_in_court||'Me',category:o.category||'Inbox',subcategory:o.subcategory||'',action:o.action||'action',status:o.status||'not_started'};
  S.extra[S.scope].unshift(t);toast('Added: '+t.description);repaint();
  setTimeout(function(){var a=document.getElementById('addRow');if(a)a.click();},40);
}
function taskCommit(e){
  var c=e.target.closest&&e.target.closest('.gedit[data-edit]');if(!c)return;
  var id=c.getAttribute('data-id'),field=c.getAttribute('data-edit'),t=findTask(id);if(!t)return;
  var newVal=c.textContent.trim(),oldVal=(effTask(t)[field]||'');
  if(newVal===oldVal)return;                          // no-op: no phantom edit, no PATCH, no re-sort
  setEdit(id,field,newVal);persistEdit(id,field,newVal);updateRiskCell(id);
}
function commitEdit(id,field,value){setEdit(id,field,value);persistEdit(id,field,value);repaint();}
function persistEdit(id,field,value){if(location.protocol.indexOf('http')!==0)return;try{var patch={};patch[field]=value;fetch('/api/tasks/'+id+'?scope='+S.scope,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(patch)});}catch(e){}}

/* notes resizers */
function wireNotes(){
  document.querySelectorAll('.resizer[data-resize]').forEach(function(rz){
    rz.addEventListener('pointerdown',function(e){
      e.preventDefault();rz.setPointerCapture&&rz.setPointerCapture(e.pointerId);
      var which=rz.getAttribute('data-resize');
      var target=document.getElementById(which==='folders'?'nfolders':'nlist');
      var startX=e.clientX,startW=target.getBoundingClientRect().width;
      function mv(ev){var w=Math.max(120,Math.min(420,startW+(ev.clientX-startX)));target.style.width=w+'px';target.style.flex='0 0 '+w+'px';S.nSizes[which]=w;}
      function up(){try{rz.releasePointerCapture(e.pointerId);}catch(x){}rz.removeEventListener('pointermove',mv);rz.removeEventListener('pointerup',up);}
      rz.addEventListener('pointermove',mv);rz.addEventListener('pointerup',up);
    });
  });
  var ir=document.getElementById('inkResizer');
  if(ir)ir.addEventListener('pointerdown',function(e){
    e.preventDefault();ir.setPointerCapture&&ir.setPointerCapture(e.pointerId);
    var body=document.getElementById('nedbody'),txt=document.getElementById('ntext');
    var startY=e.clientY,startH=txt.getBoundingClientRect().height,bodyH=body.getBoundingClientRect().height;
    function mv(ev){var h=Math.max(60,Math.min(bodyH-140,startH+(ev.clientY-startY)));txt.style.height=h+'px';S.nSizes.ink=h;}
    function up(){try{ir.releasePointerCapture(e.pointerId);}catch(x){}ir.removeEventListener('pointermove',mv);ir.removeEventListener('pointerup',up);}
    ir.addEventListener('pointermove',mv);ir.addEventListener('pointerup',up);
  });
}

/* close quick-add menu on outside click */
document.addEventListener('click',function(e){var m=document.getElementById('qaMenu');if(m&&m.classList.contains('open')&&!e.target.closest('.qa')){m.classList.remove('open');var qb=document.getElementById('qaBtn');if(qb)qb.setAttribute('aria-expanded','false');}});
/* keyboard: Escape closes the quick-add menu · Enter/Space activate role=button rows (left nav, note list) */
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){var m=document.getElementById('qaMenu');if(m&&m.classList.contains('open')){m.classList.remove('open');var qb=document.getElementById('qaBtn');if(qb){qb.setAttribute('aria-expanded','false');qb.focus();}return;}}
  if(e.key==='Enter'||e.key===' '){var t=e.target;if(t&&t.getAttribute&&t.getAttribute('role')==='button'&&t.tagName!=='BUTTON'&&t.tagName!=='INPUT'&&!t.isContentEditable){e.preventDefault();t.click();}}
});
/* inline-edit commit — registered once (not per render) */
document.addEventListener('focusout',taskCommit);

/* live Hermes layer (SSE when served) */
function connectHermes(){
  if(location.protocol.indexOf('http')!==0||typeof EventSource==='undefined')return;
  try{var es=new EventSource('/api/agent/stream?scope=both');
    es.onmessage=function(ev){var d;try{d=JSON.parse(ev.data);}catch(e){return;}
      if(d.type==='agent_signal'){var sg=d.signal;S.hermesLive.unshift({id:sg.id,scope:sg.scope,kind:sg.kind,title:sg.title,body:sg.body,conf:sg.confidence});
        if(sg.scope===S.scope){toast('✦ Hermes: '+sg.title);if(!isEditing()&&(S.view==='dashboard'||S.view==='workspace'))repaint();}}
    };
  }catch(e){}
}

/* BOOT */
render(false);
connectHermes();
if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){navigator.serviceWorker.register('/preview/sw.js').catch(function(){});}
</script>
