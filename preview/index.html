/* try backend; fall back to embedded MOCK so file:// double-click still works */
async function tryApi(path){
  try{
    const r = await fetch(path,{cache:'no-store'});
    if(!r.ok) throw 0; return await r.json();
  }catch(e){ return null; }
}

function Wordmark({accent}){

    <div className="flex items-center gap-2.5 select-none">

        <div className="text-[10px] uppercase tracking-[0.18em] text-mut">command center</div>
      </div>
    </div>
  );
}

function Tile({title, action, children, className=''}){
  return (
    <section className={`bg-ink-900 border border-line rounded-2xl shadow-tile p-4 flex flex-col min-h-0 ${className}`}>
      <header className="flex items-center justify-between mb-3">
        <h3 className="text-[11px] font-semibold uppercase tracking-[0.14em] text-mut">{title}</h3>
        {action}
      </header>
      <div className="flex-1 min-h-0">{children}</div>
    </section>
  );
}

function Pill({children, color, soft=true}){
  return <span className="text-[10px] px-1.5 py-0.5 rounded-md font-medium tnum"
    style={{color, background: soft? color+'1f':'transparent', border:`1px solid ${color}40`}}>{children}</span>;
}

              </div>
              <button onClick={()=>toast(`${s.action_label} → ${s.title}`)}

            <div className="h-full rounded-full" style={{width:u.plan_usage_pct+'%',background:accent}}></div>
          </div>
          <div className="text-[10px] text-mut mb-3">{u.plan_usage_pct}% of window used</div>
          <div className="flex items-end gap-1 h-12">
            {u.by_day.map(d=>(
              <div key={d.day} className="flex-1 flex flex-col items-center gap-1">
                <div className="w-full rounded-t" style={{height:Math.max(8,d.tokens/1.51e6*44),background:accent+'66'}}></div>
                <span className="text-[8px] text-mut">{d.day}</span>
              </div>
            ))}
          </div>
          <div className="text-[10px] text-mut mt-2 tnum">Today {fmtTok(u.tokens_today)} · Week {fmtTok(u.tokens_week)} tokens</div>
        </Tile>
      </div>

      {/* MEMORY + QUICK CAPTURE */}
      <div className="col-span-12 sm:col-span-6 lg:col-span-4">
        <Tile title="Memory · quick capture">
          <form onSubmit={e=>{e.preventDefault(); if(cap.trim()){toast(`Captured: ${cap}`); setCap('');}}} className="flex gap-1.5 mb-2.5">
            <input value={cap} onChange={e=>setCap(e.target.value)} placeholder="Capture a thought…"
              className="flex-1 bg-ink-850 border border-line rounded-lg px-2.5 py-1.5 text-[12px] outline-none focus:border-ink-500"/>
            <button className="px-3 rounded-lg text-[12px] font-semibold text-ink-950" style={{background:accent}}>+</button>
          </form>
          <div className="space-y-1.5">
            {mem.map(m=>(
              <div key={m.id} className="flex items-start gap-2 text-[11px]">
                <span className="text-[9px] px-1 py-0.5 rounded bg-ink-700 text-mut shrink-0 mt-0.5">{m.tag}</span>
                <span className="text-gray-300 leading-snug">{m.text}</span>
                <span className="text-[10px] text-mut ml-auto shrink-0">{m.ts}</span>
              </div>
            ))}
          </div>
        </Tile>
      </div>

      {/* CONSOLE shortcut tile */}
      <div className="col-span-12 lg:col-span-8">
        <Tile title="Console" action={<span className="text-[10px] text-mut">always at the bottom ↓</span>}>
          <div className="text-[12px] text-mut">Ask the agent anything, or use the mic. Try:
            <span className="text-gray-300"> "what needs me today?"</span>,
            <span className="text-gray-300"> "draft a reply to the GC"</span>,
            <span className="text-gray-300"> "add task: order site signage".</span>
          </div>
        </Tile>
      </div>
    </div>
  );
}

/* ============================ TASKS ============================ */
const FILTERS = [['all','All'],['mine','Mine'],['action','Action'],['wait','Wait'],['hold','Hold'],['read','Read'],['event','Event']];
function Tasks({scope, accent, toast}){
  const [filter,setFilter]=useState('all');
  const [extra,setExtra]=useState([]);
  const [desc,setDesc]=useState(''); const [act,setAct]=useState('action');
  const all = [...extra, ...MOCK.tasks[scope]];
  const rows = all.filter(t=>{
    if(filter==='all') return true;
    if(filter==='mine') return t.ball_in_court==='Me' && t.status!=='completed';
    return t.action===filter;
  });
  function add(e){e.preventDefault(); if(!desc.trim())return;
    setExtra([{id:'new-'+Date.now(),bang:'',description:desc,start:'06/25',followup:'',due:'',owner:'Gavin',ball_in_court:'Me',category:'Inbox',subcategory:'',action:act,status:'not_started'},...extra]);
    toast(`Added (mock write → sheet): ${desc}`); setDesc('');
  }
  return (
    <div className="fade">
      {/* quick add */}
      <form onSubmit={add} className="flex flex-wrap gap-1.5 mb-3">
        <input value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Quick-add a task… (writes via the sheet adapter)"
          className="flex-1 min-w-[200px] bg-ink-900 border border-line rounded-lg px-3 py-2 text-[13px] outline-none focus:border-ink-500"/>
        <select value={act} onChange={e=>setAct(e.target.value)}
          className="bg-ink-900 border border-line rounded-lg px-2 py-2 text-[12px] outline-none">
          {Object.keys(ACTION_LABEL).map(k=><option key={k} value={k}>{ACTION_LABEL[k]}</option>)}
        </select>
        <button className="px-4 rounded-lg text-[13px] font-semibold text-ink-950" style={{background:accent}}>Add</button>
      </form>
      {/* filter tabs */}
      <div className="flex flex-wrap gap-1.5 mb-3">
        {FILTERS.map(([k,l])=>(
          <button key={k} onClick={()=>setFilter(k)}
            className={`text-[12px] px-3 py-1 rounded-full border transition ${filter===k?'text-ink-950 font-semibold':'text-mut border-line hover:text-white'}`}
            style={filter===k?{background:accent,borderColor:accent}:{}}>
            {l}{k!=='all'&&k!=='mine'?<span className="ml-1" style={{color:filter===k?'#000':ACTION_SPINE[k]}}>●</span>:''}
          </button>
        ))}
        <span className="ml-auto text-[11px] text-mut self-center">{rows.length} shown</span>
      </div>

      {/* desktop table */}
      <div className="hidden md:block bg-ink-900 border border-line rounded-2xl overflow-hidden">
        <table className="w-full text-[12px]">
          <thead><tr className="text-[10px] uppercase tracking-wide text-mut border-b border-line">
            {['!','Description','Start','Follow-up','Due','Owner','Ball in Court','Category','Subcategory','Action','Status'].map(h=>
              <th key={h} className="text-left font-medium px-2.5 py-2 whitespace-nowrap">{h}</th>)}
          </tr></thead>
          <tbody>
            {rows.map(t=>(
              <tr key={t.id} className="border-b border-ink-850 hover:bg-ink-850/60 transition relative">
                <td className="pl-0 pr-1 py-2" style={{borderLeft:`4px solid ${ACTION_SPINE[t.action]}`}}>
                  <span className="pl-2 font-bold" style={{color:'#ef4444'}}>{t.bang}</span></td>
                <td className="px-2.5 py-2 max-w-[280px]"><span className={t.status==='completed'?'line-through text-mut':''}>{t.description}</span></td>
                <td className="px-2.5 py-2 text-mut tnum">{t.start}</td>
                <td className="px-2.5 py-2 text-mut tnum">{t.followup||'—'}</td>
                <td className="px-2.5 py-2 tnum">{t.due||'—'}</td>
                <td className="px-2.5 py-2 text-mut">{t.owner}</td>
                <td className="px-2.5 py-2">{t.ball_in_court==='Me'
                  ? <span className="font-semibold" style={{color:accent}}>Me</span>
                  : <span className="text-mut">{t.ball_in_court}</span>}</td>
                <td className="px-2.5 py-2 text-mut">{t.category}</td>
                <td className="px-2.5 py-2 text-mut">{t.subcategory||'—'}</td>
                <td className="px-2.5 py-2"><span className="flex items-center gap-1" style={{color:ACTION_SPINE[t.action]}}>
                  <span className="w-1.5 h-1.5 rounded-full" style={{background:ACTION_SPINE[t.action]}}></span>{ACTION_LABEL[t.action]}</span></td>
                <td className="px-2.5 py-2"><span className="flex items-center gap-1 text-mut">
                  <span className="w-1.5 h-1.5 rounded-full" style={{background:STATUS[t.status].dot}}></span>{STATUS[t.status].label}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* mobile cards */}
      <div className="md:hidden space-y-2">
        {rows.map(t=>(
          <div key={t.id} className="bg-ink-900 border border-line rounded-xl p-3 flex gap-2.5"
            style={{borderLeft:`4px solid ${ACTION_SPINE[t.action]}`}}>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-1.5">
                {t.bang && <span className="font-bold text-red-500">!</span>}
                <span className={`text-[13px] font-medium ${t.status==='completed'?'line-through text-mut':''}`}>{t.description}</span>
              </div>
              <div className="flex flex-wrap gap-x-3 gap-y-0.5 mt-1 text-[10px] text-mut tnum">
                <span>Due {t.due||'—'}</span><span>F/U {t.followup||'—'}</span>
                <span>{t.category}{t.subcategory?' · '+t.subcategory:''}</span>
              </div>
              <div className="flex items-center gap-2 mt-1.5">
                <span className="text-[10px] flex items-center gap-1" style={{color:ACTION_SPINE[t.action]}}>
                  <span className="w-1.5 h-1.5 rounded-full" style={{background:ACTION_SPINE[t.action]}}></span>{ACTION_LABEL[t.action]}</span>
                <span className="text-[10px] flex items-center gap-1 text-mut">
                  <span className="w-1.5 h-1.5 rounded-full" style={{background:STATUS[t.status].dot}}></span>{STATUS[t.status].label}</span>
                <span className="text-[10px] ml-auto">{t.ball_in_court==='Me'
                  ? <b style={{color:accent}}>Me</b> : <span className="text-mut">{t.ball_in_court}</span>}</span>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ============================ COCKPIT ============================ */
const STATUS_COLOR = { ok:'#22c55e', mock:'#38bdf8', stubbed:'#eab308', blocked:'#ef4444' };
function Cockpit({accent}){
  const u = MOCK.usage;
  return (
    <div className="grid gap-3 fade" style={{gridTemplateColumns:'repeat(12,minmax(0,1fr))'}}>
      <div className="col-span-12 lg:col-span-6">
        <Tile title="Connections">
          <div className="space-y-1.5">
            {MOCK.connections.map(c=>(
              <div key={c.id} className="flex items-center gap-2.5 bg-ink-850 border border-line rounded-lg px-2.5 py-2">
                <span className="w-2 h-2 rounded-full shrink-0" style={{background:STATUS_COLOR[c.status]}}></span>
                <div className="min-w-0 flex-1"><div className="text-[12px] font-medium truncate">{c.name}</div>
                  <div className="text-[10px] text-mut truncate">{c.detail}</div></div>
                <div className="text-right"><Pill color={STATUS_COLOR[c.status]}>{c.status}</Pill>
                  <div className="text-[9px] text-mut mt-0.5">{c.note}</div></div>
              </div>
            ))}
          </div>
        </Tile>
      </div>
      <div className="col-span-12 lg:col-span-6">
        <Tile title="Scheduled jobs" action={<span className="text-[10px] text-mut">Hermes cron</span>}>
          <div className="space-y-1.5">
            {MOCK.jobs.map(j=>(
              <div key={j.id} className="flex items-center gap-2.5 bg-ink-850 border border-line rounded-lg px-2.5 py-2">
                <span className="w-2 h-2 rounded-full shrink-0" style={{background:STATUS_COLOR[j.status]}}></span>
                <div className="min-w-0 flex-1"><div className="text-[12px] font-medium truncate">{j.name}</div>
                  <div className="text-[10px] text-mut tnum">{j.cron} · last {j.last}</div></div>
                <span className="text-[10px] text-mut tnum">{j.next}</span>
              </div>
            ))}
          </div>
        </Tile>
      </div>
      <div className="col-span-12 lg:col-span-5">
        <Tile title="Skills inventory">
          <div className="grid sm:grid-cols-2 gap-1.5">
            {MOCK.skills.map(s=>(
              <div key={s.id} className="bg-ink-850 border border-line rounded-lg p-2.5">
                <div className="flex items-center justify-between"><span className="text-[12px] font-medium">{s.name}</span>
                  <span className="text-[9px] px-1 rounded bg-ink-700 text-mut">{s.scope}</span></div>
                <div className="text-[10px] text-mut mt-0.5 leading-snug">{s.desc}</div>
              </div>
            ))}
          </div>
        </Tile>
      </div>
      <div className="col-span-12 lg:col-span-7">
        <Tile title="Usage ledger" action={<Pill color={accent}>{u.plan}</Pill>}>
          <div className="grid grid-cols-3 gap-2 mb-3">
            <div className="bg-ink-850 border border-line rounded-lg p-2.5"><div className="text-[10px] text-mut">Window used</div>
              <div className="text-lg font-bold tnum" style={{color:accent}}>{u.plan_usage_pct}%</div></div>
            <div className="bg-ink-850 border border-line rounded-lg p-2.5"><div className="text-[10px] text-mut">Today</div>
              <div className="text-lg font-bold tnum">{fmtTok(u.tokens_today)}</div></div>
            <div className="bg-ink-850 border border-line rounded-lg p-2.5"><div className="text-[10px] text-mut">Week</div>
              <div className="text-lg font-bold tnum">{fmtTok(u.tokens_week)}</div></div>
          </div>
          <table className="w-full text-[11px]">
            <thead><tr className="text-[9px] uppercase tracking-wide text-mut border-b border-line">
              {['Time','Agent','Model','Tokens','Scope'].map(h=><th key={h} className="text-left font-medium py-1.5">{h}</th>)}</tr></thead>
            <tbody>{u.ledger.map(l=>(
              <tr key={l.id} className="border-b border-ink-850">
                <td className="py-1.5 text-mut tnum">{l.ts}</td><td className="py-1.5">{l.agent}</td>
                <td className="py-1.5 text-mut">{l.model}</td><td className="py-1.5 tnum">{fmtTok(l.tokens)}</td>
                <td className="py-1.5"><span className="text-[9px] px-1 rounded bg-ink-700 text-mut">{l.scope}</span></td>
              </tr>))}</tbody>
          </table>
        </Tile>
      </div>
    </div>
  );
}

/* ============================ CONSOLE ============================ */
function Console({accent, log, onSend}){
  const [v,setV]=useState(''); const end=useRef();
  useEffect(()=>{ end.current && end.current.scrollIntoView({behavior:'smooth'}); },[log]);
  return (
    <div className="border-t border-line bg-ink-950/90 backdrop-blur px-3 sm:px-5 py-2">
      {log.length>0 && (
        <div className="max-h-28 overflow-y-auto mb-1.5 space-y-1">
          {log.map((m,i)=>(
            <div key={i} className="text-[11px] flex gap-2">
              <span className="shrink-0" style={{color:m.who==='you'?accent:'#8a94a6'}}>{m.who==='you'?'you':'WOM'}</span>
              <span className="text-gray-300">{m.text}</span>
            </div>
          ))}
          <div ref={end}/>
        </div>
      )}
      <form onSubmit={e=>{e.preventDefault(); if(v.trim()){onSend(v); setV('');}}} className="flex items-center gap-2">
        <span className="text-mut text-sm">›</span>
        <input value={v} onChange={e=>setV(e.target.value)} placeholder="Ask Wise Old Man…  (persistent console — every view)"
          className="flex-1 bg-transparent outline-none text-[13px] py-1.5"/>
        <button type="button" title="Voice (placeholder)" onClick={()=>onSend('🎙️ (voice input placeholder)')}
          className="w-8 h-8 grid place-items-center rounded-lg border border-line text-mut hover:text-white">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 17v4"/></svg>
        </button>
        <button className="px-3 h-8 rounded-lg text-[12px] font-semibold text-ink-950" style={{background:accent}}>Send</button>
      </form>
    </div>
  );
}

/* ============================ SHELL ============================ */
const NAV = [['home','Dashboard'],['tasks','Tasks'],['cockpit','Cockpit']];
function App(){
  const [scope,setScope]=useState('personal');
  const [view,setView]=useState('home');
  const [log,setLog]=useState([]);
  const [toastMsg,setToastMsg]=useState(null);
  const accent = scope==='personal'?'#34d399':'#f59e0b';

  function toast(t){ setToastMsg(t); setLog(l=>[...l,{who:'WOM',text:'✓ '+t+' (mock — nothing left the machine)'}]); setTimeout(()=>setToastMsg(null),2600); }
  function onSend(t){ setLog(l=>[...l,{who:'you',text:t},{who:'WOM',text:'Got it — in mock mode I only simulate actions. Wire creds (see NEEDS-FROM-YOU.md) to go live.'}]); }

  return (
    <div className="h-full flex flex-col">
      {/* top bar */}
      <header className="flex items-center gap-3 px-3 sm:px-5 py-2.5 border-b border-line bg-ink-950/80 backdrop-blur sticky top-0 z-20">
        <Wordmark accent={accent}/>
        <nav className="hidden sm:flex items-center gap-1 ml-4">
          {NAV.map(([k,l])=>(
            <button key={k} onClick={()=>setView(k)}
              className={`text-[13px] px-3 py-1.5 rounded-lg transition ${view===k?'bg-ink-800 text-white':'text-mut hover:text-white'}`}>{l}</button>
          ))}
        </nav>
        <div className="ml-auto flex items-center gap-2">
          {/* scope toggle */}
          <div className="flex items-center bg-ink-850 border border-line rounded-full p-0.5">
            {['personal','work'].map(s=>(
              <button key={s} onClick={()=>setScope(s)}
                className={`text-[12px] px-3 py-1 rounded-full transition capitalize ${scope===s?'text-ink-950 font-semibold':'text-mut'}`}
                style={scope===s?{background:s==='personal'?'#34d399':'#f59e0b'}:{}}>{s}</button>
            ))}
          </div>
          <span className="hidden sm:inline text-[10px] px-2 py-1 rounded-md border border-line text-mut">MOCK</span>
        </div>
      </header>

      {/* main */}
      <main className="flex-1 overflow-y-auto px-3 sm:px-5 py-4">
        {view==='home' && <Dashboard scope={scope} accent={accent} go={setView} toast={toast}/>}
        {view==='tasks' && <Tasks scope={scope} accent={accent} toast={toast}/>}
        {view==='cockpit' && <Cockpit accent={accent}/>}
      </main>

      {/* mobile nav */}
      <nav className="sm:hidden flex border-t border-line bg-ink-950">
        {NAV.map(([k,l])=>(
          <button key={k} onClick={()=>setView(k)}
            className={`flex-1 py-2 text-[11px] ${view===k?'text-white':'text-mut'}`}
            style={view===k?{borderTop:`2px solid ${accent}`}:{}}>{l}</button>
        ))}
      </nav>

      <Console accent={accent} log={log} onSend={onSend}/>

      {toastMsg && (
        <div className="fixed bottom-20 left-1/2 -translate-x-1/2 z-30 bg-ink-800 border border-line rounded-xl px-4 py-2 text-[12px] shadow-tile fade">
          {toastMsg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

/* register service worker when served over http (PWA installability) */
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  navigator.serviceWorker.register('/preview/sw.js').catch(()=>{});
}
</script>
</body>
