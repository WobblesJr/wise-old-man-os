<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Wise Old Man OS</title>
<meta name="theme-color" content="#FAF6EE"/>
<link rel="manifest" href="/preview/manifest.webmanifest"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Wise Old Man"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="apple-touch-icon" href="/preview/apple-touch-icon.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="/preview/icon-192.png"/>
<style>
:root{
  --bg:#FAF6EE;--surface:#FFFCF6;--s2:#FBF1E2;--border:#E6DECF;--ink:#36302A;--mut:#6E665B;
  --clay:#A65A3A;--claySoft:#FBF1E2;--pos:#5E8C6A;--warn:#B0742A;--dng:#A8503E;--rail:#F2EADA;--railA:#FBF1E2;--gl:#EFE7D8;
  --s4:4px;--s8:8px;--s12:12px;--s16:16px;--s20:20px;--s24:24px;--s32:32px;
  --p4:#857C70;--p3:#A8503E;--p2:#B0742A;--p1:#6E8AA8;--p0:#857C70;
}
*{box-sizing:border-box}
html,body,#app{height:100%;margin:0}
body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;font-size:13px;-webkit-font-smoothing:antialiased}
.serif{font-family:Georgia,'Iowan Old Style','Source Serif 4',serif}
button,input,select{font-family:inherit}
:focus-visible{outline:2px solid var(--clay);outline-offset:2px;border-radius:6px}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#DDD3C2;border-radius:6px}::-webkit-scrollbar-track{background:transparent}
.app{height:100%;display:flex;flex-direction:column}
/* top bar */
.top{min-height:54px;flex:0 0 auto;display:flex;align-items:center;gap:var(--s12);padding:calc(env(safe-area-inset-top) + var(--s8)) calc(env(safe-area-inset-right) + var(--s20)) var(--s8) calc(env(safe-area-inset-left) + var(--s20));border-bottom:1px solid var(--border);background:var(--surface);position:relative}
.logo{width:24px;height:24px;border-radius:7px;background:var(--clay);color:#fff;display:grid;place-items:center;font-weight:700;font-size:12px}
.word{font-weight:600;font-size:15px}
.seg{display:flex;background:var(--s2);border:1px solid var(--border);border-radius:999px;padding:2px}
.seg button{font-size:12px;padding:4px 13px;border:0;background:none;color:var(--mut);border-radius:999px;cursor:pointer}
.seg button.on{background:var(--surface);color:var(--ink);font-weight:600;box-shadow:0 1px 1px rgba(54,48,42,.05)}
.spacer{flex:1}
.qa{position:relative}
.qabtn{height:30px;padding:0 12px;border-radius:8px;background:var(--clay);color:#fff;border:0;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
.qamenu{position:absolute;right:0;top:36px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(54,48,42,.12);padding:6px;min-width:170px;z-index:40;display:none}
.qamenu.open{display:block}
.qamenu button{display:flex;width:100%;gap:9px;align-items:center;font-size:12.5px;padding:8px 10px;border:0;background:none;color:var(--ink);border-radius:7px;cursor:pointer;text-align:left}
.qamenu button:hover{background:var(--s2)}
.qamenu .k{margin-left:auto;color:var(--mut);font-size:11px}
.badge{font-size:10px;padding:3px 8px;border-radius:6px;border:1px solid var(--border);color:var(--mut)}
/* body */
.body{flex:1;display:flex;min-height:0}
.nav{width:212px;flex:0 0 212px;background:var(--rail);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:var(--s12) var(--s8)}
.eb{font-size:10.5px;text-transform:uppercase;letter-spacing:.13em;color:var(--mut);padding:var(--s16) var(--s12) var(--s4)}
.nrow{display:flex;align-items:center;gap:9px;padding:7px var(--s12);border-radius:8px;cursor:pointer;color:var(--mut);font-size:13px;transition:background-color .14s ease,color .14s ease}
.nrow:hover{background:var(--s2);color:var(--ink)}
.nrow.on{background:var(--railA);color:var(--ink);font-weight:500}
.nrow.sub{padding-left:24px;font-size:12.5px}
.nrow .ic{width:18px;text-align:center;color:var(--mut)}
.nrow .av{width:20px;height:20px;border-radius:6px;display:grid;place-items:center;font-size:10px;font-weight:600;background:var(--s2);color:var(--mut);flex:0 0 auto}
.nrow .av.h{background:var(--clay);color:#fff}
.nrow .lbl{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nrow .dot{width:6px;height:6px;border-radius:50%}
.nfoot{margin-top:auto;padding:var(--s12);border-top:1px solid var(--border);color:var(--mut);font-size:12px;display:flex;align-items:center;gap:8px}
.more .nrow{color:var(--mut)}
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.pane{flex:1;overflow-y:auto;padding:var(--s24)}
.pane.flush{padding:0}
.pane.tasks{padding:var(--s20) var(--s24)}
/* primitives */
.h1{font-size:21px;font-weight:600;margin:0}
.eye{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);margin-bottom:3px}
.deep{font-size:12px;color:var(--clay);text-decoration:none;cursor:pointer;background:none;border:0;padding:0}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:var(--s20)}
.tileh{display:flex;align-items:center;margin-bottom:var(--s12)}
.tileh h3{margin:0;font-size:14px;font-weight:600}
.tileh .deep{margin-left:auto}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:var(--s16)}
.stat{font-size:26px;font-weight:600;line-height:1}
.muted{color:var(--mut)}.xs{font-size:11px}.sm{font-size:12px}
.bar{height:6px;border-radius:3px;background:var(--s2);overflow:hidden}.bar>i{display:block;height:100%;border-radius:3px}
.lrow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--gl);font-size:12.5px}.lrow:last-child{border-bottom:0}
.num{margin-left:auto;font-variant-numeric:tabular-nums}
.pill{font-size:10px;padding:2px 8px;border-radius:999px;background:var(--s2);color:var(--mut)}
.dotg{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
.hero{grid-column:1/-1;border-left:3px solid var(--clay)}
.cta{background:var(--clay);color:#fff;border:0;border-radius:8px;font-size:12px;font-weight:600;padding:7px 14px;cursor:pointer}
.gbtn{background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:12px;font-weight:600;padding:7px 12px;cursor:pointer;color:var(--ink)}
.wbpips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.wbpip{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid var(--border);color:var(--ink);display:flex;align-items:center;gap:6px}
.hermes-strip{margin-top:12px;background:var(--claySoft);border:1px solid var(--border);border-left:3px solid var(--clay);border-radius:10px;padding:10px 12px}
/* tasks grid */
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:var(--s16) 0 var(--s12)}
.fchip{font-size:11.5px;padding:4px 11px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--mut);cursor:pointer}
.fchip.on{background:var(--clay);color:#fff;border-color:transparent}
.gridwrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.gscroll{overflow:auto;max-height:60vh}
table.led{width:100%;border-collapse:separate;border-spacing:0;font-size:12px}
.led th{position:sticky;top:0;background:var(--s2);text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);font-weight:600;padding:7px 9px;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;z-index:2}
.led td{padding:0;border-bottom:1px solid var(--gl);border-right:1px solid var(--gl);white-space:nowrap;vertical-align:middle}
.led tr:hover td{background:#FFFBF0}
.gcell{padding:6px 9px}
.gedit{outline:none;cursor:text;padding:6px 9px}
.gedit:hover{background:#FFF8E8}
.gedit:focus{background:#FFF8E8;box-shadow:inset 0 0 0 2px var(--clay)}
.led td.wrapcell{white-space:normal;line-height:1.4}
.gsel{appearance:none;border:0;background:transparent;font:inherit;font-size:12px;color:var(--ink);padding:6px 9px;width:100%;cursor:pointer;outline:none}
.gsel:hover{background:#FFF8E8}
.led input.gin{width:100%;border:0;background:#FFF8E8;font:inherit;font-size:12px;color:var(--ink);outline:none;padding:6px 9px}
.led input.gin:focus{box-shadow:inset 0 0 0 2px var(--clay)}
.pl{font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px}
.addbar{padding:9px 12px;border-top:1px solid var(--border);background:var(--s2);display:flex;align-items:center;gap:10px}
.strike{text-decoration:line-through;color:var(--mut)}
/* workspace */
.ws{display:flex;height:100%}
.ws .conv{flex:1.25;min-width:0;display:flex;flex-direction:column;border-right:1px solid var(--border)}
.ws .art{flex:1;min-width:0;display:flex;flex-direction:column}
.chead{display:flex;align-items:center;gap:9px;padding:var(--s16);border-bottom:1px solid var(--border)}
.chead h3{margin:0;font-size:15px;font-weight:600}
.transcript{flex:1;overflow:auto;padding:var(--s16)}
.msg{display:flex;gap:10px;margin-bottom:var(--s16)}.msg .b{flex:1;min-width:0}
.msg .nm{font-size:12.5px;font-weight:600;display:flex;gap:6px;align-items:center}
.msg .nm .ts{font-weight:400;color:var(--mut);font-size:11px}
.msg .tx{font-size:13px;line-height:1.55;margin-top:2px}
.msg.ag .tx{font-family:Georgia,serif;font-size:13.5px;line-height:1.6}
.you .tx{background:var(--claySoft);border:1px solid var(--border);border-radius:12px;padding:7px 11px;display:inline-block}
.av{width:24px;height:24px;border-radius:6px;display:grid;place-items:center;font-size:11px;font-weight:600;background:var(--s2);color:var(--mut);flex:0 0 auto}
.av.h{background:var(--clay);color:#fff}.av.you{background:var(--claySoft);color:var(--clay)}
.codeb{margin-top:10px;border:1px solid var(--border);border-radius:9px;overflow:hidden;background:var(--surface)}
.codeb .ch{font-size:10.5px;color:var(--mut);padding:5px 10px;background:var(--s2);border-bottom:1px solid var(--border);font-family:ui-monospace,Menlo,monospace}
.codeb pre{margin:0;padding:9px 10px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;line-height:1.5;color:var(--ink);overflow-x:auto}
.composer{padding:var(--s12) var(--s16);border-top:1px solid var(--border);display:flex;gap:8px}
.composer input{flex:1;border:1px solid var(--border);border-radius:9px;padding:9px 11px;font-size:13px;color:var(--ink);background:var(--surface);outline:none}
.composer .send{width:34px;height:34px;border-radius:9px;background:var(--clay);color:#fff;border:0;cursor:pointer;font-size:15px}
.tabs{display:flex;gap:4px;padding:8px;border-bottom:1px solid var(--border);background:var(--surface)}
.tabs .t{font-size:11.5px;padding:4px 10px;border-radius:7px;color:var(--mut);cursor:pointer}.tabs .t.on{background:var(--s2);color:var(--ink);font-weight:600}
.mat{padding:var(--s16);background:var(--s2);flex:1;overflow:auto}
/* notes */
.notes{display:flex;height:100%;min-height:0}
.ncol{display:flex;flex-direction:column;min-height:0;min-width:0}
.nfolders{width:190px;flex:0 0 auto;background:var(--rail);border-right:1px solid var(--border);overflow-y:auto;padding:var(--s12)}
.nlist{width:240px;flex:0 0 auto;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto}
.neditor{flex:1;min-width:0;display:flex;flex-direction:column;min-height:0;background:var(--bg)}
.resizer{flex:0 0 6px;cursor:col-resize;background:transparent;position:relative;touch-action:none}
.resizer.row{touch-action:none}
.resizer::after{content:"";position:absolute;left:2px;top:0;bottom:0;width:1px;background:var(--border)}
.resizer:hover::after{background:var(--clay);width:2px;left:2px}
.resizer.row{flex-basis:8px;cursor:row-resize;width:100%}
.resizer.row::after{left:0;right:0;top:3px;bottom:auto;height:1px;width:auto}
.nedhd{display:flex;align-items:center;gap:8px;padding:var(--s16);border-bottom:1px solid var(--border);flex:0 0 auto}
.nedbody{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.ntext{padding:var(--s16);overflow:auto;font-size:13.5px;line-height:1.6;flex:0 0 auto;min-height:0;outline:none}
.ntext:focus{box-shadow:inset 0 0 0 2px var(--claySoft)}
.inkwrap{flex:1;min-height:120px;display:flex;flex-direction:column;padding:0 var(--s16) var(--s16)}
/* editor modes: type = prose only · ink = canvas only · split = both with the row resizer */
.nedbody.mtype .resizer.row,.nedbody.mtype .inkwrap{display:none}
.nedbody.mtype .ntext{flex:1 1 auto;height:auto!important}
.nedbody.mink .resizer.row,.nedbody.mink .ntext{display:none}
.nedbody.mink .inkwrap{flex:1 1 auto}
.inkpad{flex:1;border:1px dashed var(--border);border-radius:8px;background:repeating-linear-gradient(transparent,transparent 27px,#EFE7D8 28px);min-height:120px;position:relative;overflow:hidden}
.nedfoot{flex:0 0 auto;padding:9px var(--s16);border-top:1px solid var(--gl);color:var(--mut);font-size:11px}
.note-item{padding:12px;border-bottom:1px solid var(--gl);cursor:pointer}
.note-item.on{background:var(--s2)}
.focusbtn{margin-left:auto}
/* fade */
.fade{animation:wpf .2s cubic-bezier(.22,.61,.36,1)}
@keyframes wpf{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.caret{display:inline-block;width:2px;height:14px;background:var(--clay);vertical-align:-2px;margin-left:1px;animation:wcar 1s step-end infinite}@keyframes wcar{50%{opacity:0}}
/* mobile */
.mnav{display:none}
/* iPad-portrait band (761–1024): keep desktop frame but slim the rails so the editor breathes */
@media(min-width:761px) and (max-width:1024px){
  .nav{width:176px;flex-basis:176px}
  .notes .nfolders,.notes .resizer[data-resize="folders"]{display:none}
  .ws .conv{flex:1}
}
@media(max-width:760px){
  .nav{display:none}
  .body{flex-direction:column}
  .mnav{display:flex;flex:0 0 auto;border-top:1px solid var(--border);background:var(--surface);padding-bottom:env(safe-area-inset-bottom)}
  .mnav button{flex:1;padding:12px 0;min-height:48px;font-size:11px;border:0;background:none;color:var(--mut)}
  .mnav button.on{color:var(--clay)}
  .grid2{grid-template-columns:1fr}
  .ws{flex-direction:column}.ws .conv{border-right:0;border-bottom:1px solid var(--border)}
  .ws .art{min-height:42vh}
  .nfolders.hide-m,.nlist.hide-m{display:none}
  .notes .resizer[data-resize]{display:none}      /* hide column resizers, keep the ink row-resizer */
  .fchip{min-height:34px;padding:7px 12px}
}
.notes.focus .nfolders,.notes.focus .nlist,.notes.focus .resizer[data-resize]{display:none}
.toast{position:fixed;bottom:calc(74px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--ink);color:#FAF6EE;border-radius:10px;padding:9px 15px;font-size:12px;z-index:60;box-shadow:0 8px 24px rgba(0,0,0,.2)}

/* ==================== FEATURE MODULES (CSS) ==================== */
/* ============================================================
   Persistent activity log / console [activity-log]
   ============================================================ */
/* ===== activity-log ===== */
.act-wrap{max-width:760px}
.act-day{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);margin:var(--s20) 0 var(--s8);padding-bottom:6px;border-bottom:1px solid var(--gl)}
.act-day:first-child{margin-top:var(--s8)}
.act-row{display:flex;gap:11px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--gl)}
.act-row:last-child{border-bottom:0}
.act-ic{width:26px;height:26px;flex:0 0 auto;border-radius:7px;display:grid;place-items:center;font-size:12px;background:var(--s2);color:var(--mut)}
.act-bd{flex:1;min-width:0}
.act-tx{font-size:12.5px;line-height:1.5;color:var(--ink)}
.act-mt{display:flex;align-items:center;gap:8px;margin-top:4px}
.act-chip{font-size:10px;padding:2px 8px;border-radius:999px;background:var(--s2);color:var(--mut);text-transform:capitalize}
/* "not live" = mock / not yet connected to a real source — flagged in red */
.notlive{color:var(--dng)}
.badge.mock{color:var(--dng);border-color:var(--dng);font-weight:700;letter-spacing:.05em}
.lrow.notlive>span{color:var(--dng)}
.ws-wait{font-size:11px;color:var(--dng);font-style:italic;padding:4px 0 10px 34px}
.act-time{font-size:11px;color:var(--mut);font-variant-numeric:tabular-nums}
.act-empty{padding:var(--s24);text-align:center;color:var(--mut);font-size:12.5px}
/* dashboard / cockpit peek */
.act-peek .lrow{align-items:flex-start;gap:9px}
.act-peek .act-ic{width:22px;height:22px;font-size:11px}
.act-peek .pk-tx{flex:1;min-width:0;line-height:1.4;white-space:normal}
.act-peek .pk-ts{margin-left:auto;flex:0 0 auto;color:var(--mut);font-size:11px;font-variant-numeric:tabular-nums}
@media(max-width:760px){.act-wrap{max-width:none}}

/* ============================================================
   Approvals queue [approvals]
   ============================================================ */
/* ===== Approvals queue [approvals] ===== */
.apprwrap{max-width:760px}
.apprsec{margin-bottom:var(--s24)}
.apprsec .eb{padding-left:0}
.appr{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:var(--s16);margin-bottom:var(--s12);border-left:3px solid var(--border)}
.appr.pend{border-left-color:var(--clay)}
.appr.resolved{opacity:.72}
.apprhd{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.apprhd .ti{font-weight:600;font-size:13.5px}
.kchip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.03em}
.appr-to{font-size:11.5px;color:var(--mut)}
.appr-to b{color:var(--ink);font-weight:600}
.appr-src{margin-left:auto;font-size:10px;padding:2px 8px;border-radius:999px;background:var(--s2);color:var(--mut);white-space:nowrap}
.appr-src.h{background:var(--claySoft);color:var(--clay);font-weight:700}
.appr-body{font-size:12.5px;line-height:1.55;color:var(--ink);background:var(--s2);border:1px solid var(--gl);border-radius:8px;padding:9px 11px;margin:8px 0}
.appr-body.editing{outline:none;background:#FFF8E8;box-shadow:inset 0 0 0 2px var(--clay);cursor:text}
.appr-acts{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.appr-acts .verdict{font-size:11px;font-weight:700;padding:2px 9px;border-radius:6px}
.appr-acts .verdict.ok{background:#5E8C6A22;color:var(--pos)}
.appr-acts .verdict.no{background:#A8503E22;color:var(--dng)}
.btn-ok{background:var(--pos);color:#fff;border:0;border-radius:8px;font-size:12px;font-weight:600;padding:7px 14px;cursor:pointer}
.btn-no{background:var(--surface);color:var(--dng);border:1px solid var(--border);border-radius:8px;font-size:12px;font-weight:600;padding:7px 12px;cursor:pointer}
.appr-empty{color:var(--mut);font-size:12.5px;padding:var(--s16);text-align:center;border:1px dashed var(--border);border-radius:10px}
/* nav pending-count badge */
.nrow .nbadge{margin-left:auto;font-size:10px;font-weight:700;min-width:17px;height:17px;padding:0 5px;border-radius:999px;background:var(--clay);color:#fff;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto}
.mnav .mb{position:absolute;top:6px;margin-left:13px;font-size:9px;font-weight:700;min-width:15px;height:15px;padding:0 4px;border-radius:999px;background:var(--clay);color:#fff;display:inline-flex;align-items:center;justify-content:center}
.mnav button{position:relative}
.hero-appr{display:inline-flex;align-items:center;gap:7px;margin-top:10px;font-size:12px;color:var(--clay);background:var(--claySoft);border:1px solid var(--border);border-radius:999px;padding:4px 12px;cursor:pointer}
.hero-appr b{font-weight:700}

/* ============================================================
   Ball-in-Court chaser drafts [chaser]
   ============================================================ */
/* ===== [chaser] Ball-in-Court chase actions ===== */
/* small per-row "Chase" action button in the Tasks grid */
.chasebtn{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--clay);cursor:pointer;white-space:nowrap;line-height:1.2}
.chasebtn:hover{background:var(--claySoft);border-color:var(--clay)}

var TODAY=new Date(2026,5,28);
function parseMD(s){if(!s)return null;var m=(''+s).split('/');if(m.length<2)return null;return new Date(2026,parseInt(m[0],10)-1,parseInt(m[1],10));}
function riskOf(t){
  if(t.status==='completed')return{band:'done',reason:'completed'};
  var due=parseMD(t.due),fu=parseMD(t.followup);
  var dtd=due?Math.round((due-TODAY)/86400000):null;
  var dpf=fu?Math.round((TODAY-fu)/86400000):null;
  var band='green',r=[];
  if(dtd!=null){if(dtd<0){band='red';r.push('overdue '+(-dtd)+'d');}else if(dtd<=2){band='red';r.push('due in '+dtd+'d');}else if(dtd<=5){band='amber';r.push('due in '+dtd+'d');}}
  if(dpf!=null&&dpf>0){band=maxB(band,dpf>=3?'red':'amber');r.push((t.ball_in_court!=='Me'?'waiting on '+t.ball_in_court:'follow-up')+' '+dpf+'d');}
  if(t.status==='blocked'&&band==='green'){band='amber';r.push('blocked');}
  return{band:band,reason:r.join(', ')||'on track',dtd:dtd};
}
function maxB(a,b){var o=['green','amber','red'];return o.indexOf(a)>=o.indexOf(b)?a:b;}
function scoreOf(t){var b={red:100,amber:50,green:10,done:0}[riskOf(t).band]||0;var d=parseMD(t.due);if(d)b+=Math.max(0,30-Math.round((d-TODAY)/86400000));return b;}
function prioOf(t){
  if(t._prio!=null)return{level:t._prio,src:'you'};
  if(MOCK.prio[t.id]!=null)return{level:MOCK.prio[t.id],src:'hermes'};
  var lvl={red:4,amber:3,green:1,done:0}[riskOf(t).band];return{level:lvl==null?2:lvl,src:'rules'};
}

function go(v,a){S.view=v;if(a)S.agent=a;render(true);if(v==='workspace')loadConsole();}

  document.querySelectorAll('[data-view]').forEach(function(el){el.onclick=function(e){e.stopPropagation();go(el.getAttribute('data-view'),el.getAttribute('data-agent')||null);};});

  document.querySelectorAll('[data-sort]').forEach(function(el){el.onclick=function(){var k=el.getAttribute('data-sort');if(S.sortCol===k)S.sortDir=S.sortDir==='asc'?'desc':'asc';else{S.sortCol=k;S.sortDir=(k==='prio'||k==='risk')?'desc':'asc';}repaint();};});

function placeCaretEnd(el){try{el.focus();var r=document.createRange();r.selectNodeContents(el);r.collapse(false);var s=getSelection();s.removeAllRanges();s.addRange(r);}catch(e){if(el)el.focus();}}

function taskCommit(e){

/* relative + day-bucket helpers (anchored to the app's notion of "now") */
function actNow(){return (typeof TODAY!=='undefined')?Date.now():Date.now();}
function relTime(ts){
  var d=Date.now()-ts,s=Math.round(d/1000);
  if(s<45)return 'just now';
  var m=Math.round(s/60);if(m<60)return m+'m ago';
  var h=Math.round(m/60);if(h<24)return h+'h ago';
  var dd=Math.round(h/24);if(dd<7)return dd+'d ago';
  var wk=Math.round(dd/7);if(wk<5)return wk+'w ago';
  return new Date(ts).toLocaleDateString();
}
function dayKey(ts){var d=new Date(ts);return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();}
function dayLabel(ts){
  var now=new Date(),d=new Date(ts);
  var k=dayKey(ts),tk=dayKey(now.getTime()),yk=dayKey(now.getTime()-86400000);
  if(k===tk)return 'Today';
  if(k===yk)return 'Yesterday';
  return d.toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'});
}

/* filtered, newest-first */
function activityRows(){
  return S.activity.filter(function(ev){

/* ===================== APPROVALS [approvals] ===================== */
/* OWNS: S.approvals + addApproval + resolveApproval. Everything is MOCK — no real sends. */
var APPR_KIND={note:'Draft',chase:'Chase',edit:'Sheet write',approval:'Action',signal:'Signal',alert:'Alert'};
var APPR_KINDC={note:'#6E8AA8',chase:'#B0742A',edit:'#9A7AA8',approval:'#A8503E',signal:'#5E8C6A',alert:'#A8503E'};

function pendingFor(scope){return S.approvals.filter(function(a){return a.scope===scope&&a.status==='pending';});}
function pendingCount(scope){return pendingFor(scope).length;}

/* [approvals] addApproval(o): assigns id, sets status 'pending', logs. Callable by [chaser] etc. */
function addApproval(o){
  var a={id:'a-'+Date.now()+'-'+Math.floor(Math.random()*1000),
    scope:o.scope||S.scope,kind:o.kind||'approval',title:o.title||'(untitled)',
    to:o.to||'—',body:o.body||'',status:'pending',source:o.source||'you',
    created:o.created||nowClock()};
  S.approvals.unshift(a);
  if(typeof logEvent==='function')logEvent('approval',a.scope,'New approval queued: '+a.title,{id:a.id,kind:a.kind,to:a.to});
  return a;
}
/* [approvals] resolveApproval(id, verdict): sets status, logs, toasts. */
function resolveApproval(id,verdict){
  var a=findApproval(id);if(!a||a.status!=='pending')return;
  a.status=verdict==='approve'?'approved':'rejected';
  if(typeof logEvent==='function')logEvent('approval',a.scope,(a.status==='approved'?'Approved':'Rejected')+': '+a.title,{id:a.id,to:a.to});
  toast((a.status==='approved'?'Approved (mock): ':'Rejected (mock): ')+a.title);
}
function findApproval(id){for(var i=0;i<S.approvals.length;i++)if(S.approvals[i].id===id)return S.approvals[i];return null;}
function nowClock(){var d=new Date();var h=d.getHours(),m=d.getMinutes();var ap=h<12?'am':'pm';h=h%12;if(h===0)h=12;return h+':'+(m<10?'0':'')+m+ap;}

/* ----- APPROVALS VIEW ----- */
function apprCard(a){
  var pend=a.status==='pending';
  var kc=APPR_KINDC[a.kind]||'var(--mut)';
  var srcH=a.source==='hermes';
  var src='<span class="appr-src'+(srcH?' h':'')+'">'+(srcH?'✦ Hermes':'You')+'</span>';
  var editing=S.apprEdit===a.id;
  var bodyCls='appr-body'+(editing?' editing':'');
  var bodyAttr=editing?' contenteditable="true" data-appr-body="'+a.id+'"':'';
  var verdict=pend?'':'<span class="verdict '+(a.status==='approved'?'ok':'no')+'">'+(a.status==='approved'?'✓ Approved':'✕ Rejected')+'</span>';
  var acts=pend
    ? '<button class="btn-ok" data-appr-ok="'+a.id+'">Approve</button>'+
      '<button class="btn-no" data-appr-no="'+a.id+'">Reject</button>'+
      '<button class="gbtn" data-appr-edit="'+a.id+'">'+(editing?'Done':'Edit')+'</button>'+
      '<span class="xs notlive" style="margin-left:auto">'+esc(a.created)+' · mock — won’t send</span>'
    : '<span class="appr-acts">'+verdict+'</span><span class="xs muted" style="margin-left:auto">'+esc(a.created)+'</span>';
  return '<div class="appr '+(pend?'pend':'resolved')+'" data-appr-id="'+a.id+'">'+
    '<div class="apprhd"><span class="kchip" style="background:'+kc+'22;color:'+kc+'">'+(APPR_KIND[a.kind]||a.kind)+'</span>'+
      '<span class="ti">'+esc(a.title)+'</span>'+src+'</div>'+
    '<div class="appr-to">to <b>'+esc(a.to)+'</b></div>'+
    '<div class="'+bodyCls+'"'+bodyAttr+'>'+esc(a.body)+'</div>'+
    '<div class="appr-acts">'+acts+'</div></div>';
}
function approvals(){
  var scoped=S.approvals.filter(function(a){return a.scope===S.scope;});
  var pend=scoped.filter(function(a){return a.status==='pending';});
  var done=scoped.filter(function(a){return a.status!=='pending';});
  var f=S.apprFilter;
  var chips=[['all','All'],['pending','Pending'],['resolved','Resolved']].map(function(c){
    return '<button class="fchip'+(f===c[0]?' on':'')+'" data-appr-filter="'+c[0]+'">'+c[1]+(c[0]==='pending'&&pend.length?' '+pend.length:'')+'</button>';
  }).join('');
  var out='<div style="display:flex;align-items:baseline"><div><div class="h1 serif">Approvals</div>'+
    '<div class="xs muted">'+(S.scope==='work'?'Project Alpha + Beta':'Personal')+' · '+pend.length+' awaiting you</div></div>'+
    '<div class="xs muted" style="margin-left:auto">nothing is sent — every action is staged & mock</div></div>'+
    '<div class="toolbar">'+chips+'</div>';
  out+='<div class="apprwrap">';
  if(f!=='resolved'){
    out+='<div class="apprsec"><div class="eb">Pending · '+pend.length+'</div>'+
      (pend.length?pend.map(apprCard).join(''):'<div class="appr-empty">Nothing awaiting you in '+S.scope+'. ✓</div>')+'</div>';
  }
  if(f!=='pending'){
    out+='<div class="apprsec"><div class="eb">Resolved · '+done.length+'</div>'+
      (done.length?done.map(apprCard).join(''):'<div class="appr-empty">No history yet.</div>')+'</div>';
  }
  out+='</div>';
  return out;
}

/* ============================================================
   Ball-in-Court chaser drafts [chaser]
   ============================================================ */
/* ============================================================
   [chaser] Ball-in-Court chaser drafts
   - draftChase(task) -> polite, specific chase message text
   - chaseTask(id)    -> stages ONE chase as a pending approval
   - chaseAllWaiting()-> stages a chase for every visible waiting task
   - bindChaser()     -> wires all chase buttons; call from bind()
   Does NOT send anything. Everything becomes a pending approval
   via [approvals].addApproval(). Reuses parseMD/TODAY/effTask/
   allTasks/findTask/riskOf/toast/esc/go from the host app.
   ============================================================ */

/* ball-in-court tasks that are still open and NOT on me */
function waitingTasks(){
  return allTasks().map(effTask).filter(function(e){
    return e.ball_in_court && e.ball_in_court!=='Me' && e.status!=='completed';
  });
}
/* how many days a task has been waiting on the ball holder (>=0), or null */
function daysWaiting(e){
  var fu=parseMD(e.followup), st=parseMD(e.start), ref=fu||st;
  if(!ref)return null;
  var d=Math.round((TODAY-ref)/86400000);
  return d>0?d:0;
}
function daysToDue(e){
  var due=parseMD(e.due);
  return due?Math.round((due-TODAY)/86400000):null;
}
/* humanize a 'mm/dd' due-date phrase */
function dueClause(e){
  var dtd=daysToDue(e);
  if(dtd==null)return '';
  if(dtd<0)return "it's now "+(-dtd)+" day"+((-dtd)===1?'':'s')+" overdue (was due "+e.due+")";
  if(dtd===0)return "it's due today ("+e.due+")";
  return "it's due "+e.due+" — "+dtd+" day"+(dtd===1?'':'s')+" out";
}

/* PUBLIC: returns the chase message text (no side effects) */
function draftChase(task){
  var e=effTask(task);
  var who=e.ball_in_court||'there';
  var desc=(e.description||'this item').replace(/\s+/g,' ').trim();
  var dw=daysWaiting(e);
  var waitClause = dw==null ? '' :
    (dw===0 ? "It just landed with you" :
              "It's been waiting on you for "+dw+" day"+(dw===1?'':'s')+
              (e.followup?" (follow-up was "+e.followup+")":""));
  var due=dueClause(e);
  // stitch the middle sentence from whichever clauses we actually have
  var mid;
  if(waitClause&&due) mid=waitClause+", and "+due+".";
  else if(waitClause) mid=waitClause+".";
  else if(due) mid="Quick note that "+due+".";
  else mid="Just keeping this one moving.";
  var ask = (daysToDue(e)!=null && daysToDue(e)<0)
    ? "Could you let me know where this stands, or send it over as soon as you can so we can close it out?"
    : "Could you let me know where this stands, or "+
      (e.due?("send it over by "+e.due+" "):"send it over ")+"so we stay on track?";
  return "Hi "+who+",\n\n"+
    "Following up on \""+desc+".\" "+mid+"\n\n"+
    ask+" Happy to jump on a quick call if that's faster.\n\n"+
    "Thanks,\nGavin";
}

/* guarded bridge to [approvals].addApproval — degrades to a toast if approvals isn't wired yet */
function stageApproval(o){
  if(typeof addApproval==='function'){addApproval(o);return true;}
  toast('Drafted chase to '+o.to+' (approvals layer not wired yet)');
  return false;
}

/* PUBLIC: stage ONE chase for a task id. opts.jump=false suppresses navigation */
function chaseTask(id,opts){
  var t=findTask(id); if(!t)return false;
  var e=effTask(t);
  if(!e.ball_in_court||e.ball_in_court==='Me'){toast('That one is on you — nothing to chase');return false;}
  var staged=stageApproval({
    kind:'chase',
    to:e.ball_in_court,
    scope:S.scope,
    title:'Chase '+e.ball_in_court+' — '+(e.description||'').slice(0,60),
    body:draftChase(t)
  });
  if(staged){
    toast('Chase to '+e.ball_in_court+' staged for your approval');
    if(S.chaseJump && (!opts||opts.jump!==false) && hasApprovalsView() && S.view!=='approvals') go('approvals');
  }
  return staged;
}

/* PUBLIC: stage a chase for every currently-visible waiting task */
function chaseAllWaiting(){
  var list=waitingTasks();
  if(!list.length){toast('Nothing waiting on anyone else right now');return 0;}
  var n=0;
  list.forEach(function(e){
    var ok=stageApproval({
      kind:'chase', to:e.ball_in_court, scope:S.scope,
      title:'Chase '+e.ball_in_court+' — '+(e.description||'').slice(0,60),
      body:draftChase(e)   // effTask already applied; draftChase re-applies harmlessly
    });
    if(ok)n++;
  });
  toast('Staged '+n+' chase'+(n===1?'':'s')+' for your approval');
  if(S.chaseJump && hasApprovalsView() && n>0 && S.view!=='approvals') go('approvals');
  return n;
}

/* true if the [approvals] feature has registered its view */
function hasApprovalsView(){return typeof VIEWS!=='undefined' && !!VIEWS.approvals;}

/* WIRING — call this inside bind() */
function bindChaser(){
  // per-row + dashboard-hero chase buttons (data-chase="<taskId>")
  document.querySelectorAll('[data-chase]').forEach(function(el){
    el.onclick=function(ev){ev.stopPropagation();chaseTask(el.getAttribute('data-chase'));};
  });
  // toolbar "Chase all waiting"
  var ca=document.getElementById('chaseAll');
  if(ca)ca.onclick=function(ev){ev.stopPropagation();chaseAllWaiting();};
}

/* helper the Tasks grid calls per row to render the action cell (returns a <td>) */
function chaseCell(t){

/* ============================================================
   Global search / command palette [search-palette] — openSearch() overlay (Cmd/Ctrl-K + top-bar affordance), keyboard-driven, ranks Tasks / Notes / Commands.
   ============================================================ */
/* ===================== COMMAND PALETTE [search-palette] ===================== */
/* Self-contained overlay appended to <body>. Does NOT depend on render()/repaint().
   openSearch() opens it; Cmd/Ctrl-K toggles; Escape closes & returns focus. */
var PAL={open:false,sel:0,flat:[],lastFocus:null};

function palCommands(){
  // static command list; each: {label, sub, run}
  var views=[['dashboard','Dashboard'],['tasks','Tasks'],['workspace','Workspace'],['cockpit','Cockpit'],['notes','Notes']];
  var cmds=views.map(function(v){return {label:'Go to '+v[1],sub:'view',kw:'go '+v[0]+' '+v[1],run:function(){closeSearch();go(v[0]);}};});
  // Approvals / Activity — owned by other modules; fall back gracefully if not present yet
  cmds.push({label:'Go to Approvals',sub:'view',kw:'go approvals inbox',run:function(){closeSearch();palGoMaybe('approvals');}});
  cmds.push({label:'Go to Activity',sub:'view',kw:'go activity log feed',run:function(){closeSearch();palGoMaybe('activity');}});
  cmds.push({label:'New task',sub:'add a spreadsheet row',kw:'new task add row create',run:function(){
    closeSearch();S.view='tasks';render(true);setTimeout(function(){var a=document.getElementById('addRow');if(a)a.click();},60);}});
  cmds.push({label:'New note',sub:'→ Obsidian',kw:'new note create write',run:function(){closeSearch();S.view='notes';render(true);}});
  cmds.push({label:'Toggle Work / Personal',sub:'currently '+S.scope,kw:'toggle scope work personal switch',run:function(){
    closeSearch();S.scope=(S.scope==='work'?'personal':'work');render(true);toast('Scope: '+S.scope);}});
  return cmds;
}
/* navigate to a view that may be registered by a sibling module; toast if it isn't wired yet */
function palGoMaybe(view){
  if(typeof VIEWS!=='undefined'&&VIEWS[view]){go(view);}
  else{toast(view.charAt(0).toUpperCase()+view.slice(1)+' — opening (mock)');}
}

/* scoring: returns -1 for no match, else lower=better. matches all query tokens as substrings. */
function palScore(hay,q){
  hay=(' '+hay+' ').toLowerCase();
  var toks=q.toLowerCase().split(/\s+/).filter(Boolean),score=0,i;
  for(i=0;i<toks.length;i++){
    var at=hay.indexOf(toks[i]);
    if(at<0)return -1;
    score+=at;                       // earlier match = better
    if(hay.charAt(at-1)===' ')score-=8;  // word-start bonus
  }
  return score;
}
function palHighlight(text,q){
  var t=esc(text||''),toks=q.toLowerCase().split(/\s+/).filter(Boolean);
  if(!toks.length)return t;
  // build a safe regex from escaped (already HTML-escaped) tokens
  var pat=toks.map(function(x){return x.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}).join('|');
  try{return t.replace(new RegExp('('+pat+')','ig'),'<mark>$1</mark>');}catch(e){return t;}
}

function palCollect(q){
  var groups=[];
  // ---- TASKS (current scope) ----
  var tHits=allTasks().map(function(t){
    var e=effTask(t);
    var hay=[e.description,e.category,e.subcategory,e.owner,e.ball_in_court].join(' ');
    return {t:t,e:e,sc:q?palScore(hay,q):0};
  }).filter(function(x){return q?x.sc>=0:true;});
  tHits.sort(function(a,b){return a.sc-b.sc;});
  if(tHits.length)groups.push({grp:'Tasks',items:tHits.slice(0,6).map(function(x){
    var e=x.e;
    return {cls:'task',ic:'▤',title:e.description,sub:(e.category||'')+(e.ball_in_court&&e.ball_in_court!=='Me'?' · ball: '+e.ball_in_court:''),meta:e.due||'',
      run:function(){closeSearch();S.view='tasks';S.filter='all';render(true);
        setTimeout(function(){var tr=document.querySelector('#ledBody tr[data-id="'+x.t.id+'"]');
          if(tr){tr.scrollIntoView({block:'center'});var c=tr.querySelector('.gedit[data-edit="description"]');if(c){c.focus();}}},80);
      }};
  })});
  // ---- NOTES (both scopes so search is global) ----
  var nHits=[];
  ['work','personal'].forEach(function(fold){
    (MOCK.notes[fold]||[]).forEach(function(n,i){
      var hay=(n[0]||'')+' '+(n[3]||'');
      var sc=q?palScore(hay,q):0;
      if(q?sc>=0:true)nHits.push({fold:fold,i:i,n:n,sc:sc});
    });
  });
  nHits.sort(function(a,b){return a.sc-b.sc;});
  if(nHits.length)groups.push({grp:'Notes',items:nHits.slice(0,6).map(function(x){
    return {cls:'note',ic:'✎',title:x.n[0],sub:(x.n[3]||'').slice(0,60),meta:x.fold,
      run:function(){closeSearch();S.view='notes';S.noteFolder=x.fold;S.noteIdx=x.i;render(true);}};
  })});
  // ---- COMMANDS ----
  var cHits=palCommands().map(function(c){
    var sc=q?palScore(c.label+' '+(c.kw||''),q):0;
    return {c:c,sc:sc};
  }).filter(function(x){return q?x.sc>=0:true;});
  cHits.sort(function(a,b){return a.sc-b.sc;});
  if(cHits.length)groups.push({grp:'Commands',items:cHits.slice(0,8).map(function(x){
    return {cls:'cmd',ic:'⌘',title:x.c.label,sub:x.c.sub,meta:'',run:x.c.run};
  })});
  return groups;
}

function palRender(){
  var q=PAL.input?PAL.input.value.trim():'';
  S.paletteQuery=q;
  var groups=palCollect(q);
  // flatten for keyboard nav
  PAL.flat=[];
  groups.forEach(function(g){g.items.forEach(function(it){PAL.flat.push(it);});});
  if(PAL.sel>=PAL.flat.length)PAL.sel=PAL.flat.length?PAL.flat.length-1:0;
  if(PAL.sel<0)PAL.sel=0;
  var idx=0;
  var html=groups.map(function(g){
    return '<div class="pal-grp">'+g.grp+'</div>'+g.items.map(function(it){
      var i=idx++;
      return '<div class="pal-row '+it.cls+(i===PAL.sel?' sel':'')+'" role="option" aria-selected="'+(i===PAL.sel?'true':'false')+'" data-pi="'+i+'">'+
        '<span class="pal-ic">'+it.ic+'</span>'+
        '<span class="pal-main"><div class="pal-t">'+palHighlight(it.title,q)+'</div>'+
        (it.sub?'<div class="pal-sub">'+palHighlight(it.sub,q)+'</div>':'')+'</span>'+
        (it.meta?'<span class="pal-meta">'+esc(it.meta)+'</span>':'')+'</div>';
    }).join('');
  }).join('');
  if(!PAL.flat.length)html='<div class="pal-empty">No matches for "'+esc(q)+'"</div>';
  PAL.results.innerHTML=html;
  // wire row clicks + hover-select
  PAL.results.querySelectorAll('[data-pi]').forEach(function(el){
    el.onmousedown=function(e){e.preventDefault();}; // keep input focus
    el.onclick=function(){var i=+el.getAttribute('data-pi');if(PAL.flat[i])PAL.flat[i].run();};
    el.onmousemove=function(){var i=+el.getAttribute('data-pi');if(i!==PAL.sel){PAL.sel=i;palMarkSel();}};
  });
  palScrollSel();
}
/* lightweight selection update without re-rendering the whole list */
function palMarkSel(){
  PAL.results.querySelectorAll('.pal-row').forEach(function(el){
    var on=(+el.getAttribute('data-pi')===PAL.sel);
    el.classList.toggle('sel',on);el.setAttribute('aria-selected',on?'true':'false');
  });
}
function palScrollSel(){
  var el=PAL.results.querySelector('.pal-row.sel');
  if(el&&el.scrollIntoView)el.scrollIntoView({block:'nearest'});
}

function openSearch(){
  if(PAL.open){PAL.input.focus();PAL.input.select();return;}
  PAL.open=true;PAL.sel=0;
  PAL.lastFocus=document.activeElement;
  var scrim=document.createElement('div');
  scrim.className='pal-scrim';scrim.id='palScrim';
  scrim.innerHTML=
    '<div class="pal" role="dialog" aria-modal="true" aria-label="Search and commands">'+
      '<div class="pal-top"><span class="pal-mag">⌕</span>'+
        '<input class="pal-in" id="palIn" type="text" placeholder="Search tasks, notes, or run a command…" '+
        'autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" aria-controls="palResults" role="combobox" aria-expanded="true"/>'+
        '<span class="pal-scope">'+esc(S.scope)+'</span></div>'+
      '<div class="pal-results" id="palResults" role="listbox"></div>'+
      '<div class="pal-foot"><span><span class="kbd">↑↓</span> move</span><span><span class="kbd">↵</span> open</span><span><span class="kbd">esc</span> close</span><span class="sp">'+
        'Tasks · Notes · Commands</span></div>'+
    '</div>';
  document.body.appendChild(scrim);
  PAL.input=scrim.querySelector('#palIn');
  PAL.results=scrim.querySelector('#palResults');
  PAL.input.value=S.paletteQuery||'';
  PAL.input.addEventListener('input',function(){PAL.sel=0;palRender();});
  PAL.input.addEventListener('keydown',palKey);
  // scrim click (outside the dialog) closes
  scrim.addEventListener('mousedown',function(e){if(e.target===scrim)closeSearch();});
  palRender();
  // animate in + focus (rAF so transition fires)
  requestAnimationFrame(function(){scrim.classList.add('in');PAL.input.focus();PAL.input.select();});
}
function closeSearch(){
  var scrim=document.getElementById('palScrim');if(!scrim)return;
  PAL.open=false;
  scrim.classList.remove('in');
  var lf=PAL.lastFocus;
  setTimeout(function(){if(scrim&&scrim.parentNode)scrim.parentNode.removeChild(scrim);},150);
  PAL.input=null;PAL.results=null;
  // return focus
  try{if(lf&&lf.focus&&document.contains(lf))lf.focus();}catch(e){}
}
function palKey(e){
  if(e.key==='Escape'){e.preventDefault();closeSearch();return;}
  if(e.key==='ArrowDown'){e.preventDefault();if(PAL.flat.length){PAL.sel=(PAL.sel+1)%PAL.flat.length;palMarkSel();palScrollSel();}return;}
  if(e.key==='ArrowUp'){e.preventDefault();if(PAL.flat.length){PAL.sel=(PAL.sel-1+PAL.flat.length)%PAL.flat.length;palMarkSel();palScrollSel();}return;}
  if(e.key==='Enter'){e.preventDefault();var it=PAL.flat[PAL.sel];if(it)it.run();return;}
  // focus trap: Tab cycles selection instead of leaving the input
  if(e.key==='Tab'){e.preventDefault();if(PAL.flat.length){PAL.sel=(PAL.sel+(e.shiftKey?-1:1)+PAL.flat.length)%PAL.flat.length;palMarkSel();palScrollSel();}return;}
}

/* single bindable entry point — call inside bind() */
function bindSearch(){
  var sb=document.getElementById('searchBtn');
  if(sb)sb.onclick=function(e){e.stopPropagation();openSearch();};
}

/* global Cmd/Ctrl-K (registered ONCE, like the other document-level listeners) */
document.addEventListener('keydown',function(e){
  if((e.metaKey||e.ctrlKey)&&(e.key==='k'||e.key==='K')){e.preventDefault();if(PAL.open)closeSearch();else openSearch();}
});

/* ============ notes-vault-tree ============ */
/* Resolve a folder node from a path array of names (root tier first). Returns {node,parentChildren} or null. */
function vaultFind(path){
  var list=MOCK.vault.tiers,node=null;
  for(var i=0;i<path.length;i++){
    node=null;
    for(var j=0;j<list.length;j++){if(list[j].name===path[i]&&list[j].kind==='folder'){node=list[j];break;}}
    if(!node)return null;
    list=node.children||[];
  }
  return node;
}
/* Direct .md file children of a folder node, as note tuples for the middle list. */
function vaultFilesAt(node){
  if(!node||!node.children)return [];
  return node.children.filter(function(c){return c.kind==='file';});
}
/* The note list the editor + middle column should show, given current vault selection. */
function vaultActiveFiles(){
  if(S.vaultPath.length){var n=vaultFind(S.vaultPath);if(n)return vaultFilesAt(n).map(function(f){return f.note;});}
  return MOCK.notes[S.noteFolder]||[];  // fallback: no folder picked yet → legacy Work/Personal list
}
/* Recursive collapsible tree HTML. `path` is the accumulated name array to this node. */
function vaultNodeHtml(node,path,depth,isTier){
  var here=path.concat([node.name]),key=here.join('/');
  if(node.kind==='file'){
    var sel=arrEq(S.vaultPath,path);var files=vaultFilesAt(vaultFind(path)||{children:[]});
    var idx=files.indexOf(node);var cur=sel&&idx===S.vaultIdx;
    return '<div class="vnode file'+(cur?' cur':'')+'" style="padding-left:'+(depth*12+7)+'px" tabindex="0" role="button" '+
      'data-vfile="'+esc(key)+'" data-vfolder="'+esc(path.join('/'))+'" data-vidx="'+idx+'">'+
      '<span class="vic fic">▪</span><span class="vlbl">'+esc(node.name)+'</span></div>';
  }
  var open=!!S.vaultExpand[key];var onFolder=arrEq(S.vaultPath,here);
  var twist='<span class="vtw">▶</span>';
  var ic=isTier?'':'<span class="vic">'+(open?'▾':'▸')+'</span>';
  var head='<div class="vnode'+(isTier?' tier':'')+(open?' open':'')+(onFolder?' on':'')+'" style="padding-left:'+(depth*12+7)+'px" '+
    'tabindex="0" role="button" data-vdir="'+esc(key)+'">'+twist+'<span class="vic">'+(node.kind==='folder'?(isTier?'◆':'▸'):'')+'</span>'+
    '<span class="vlbl">'+esc(node.name)+'</span></div>';
  var kids='<div class="vkids'+(open?'':' collapsed')+'">'+(node.children||[]).map(function(c){
    return vaultNodeHtml(c,here,depth+1,false);
  }).join('')+'</div>';
  return head+kids;
}
function arrEq(a,b){if(!a||!b||a.length!==b.length)return false;for(var i=0;i<a.length;i++)if(a[i]!==b[i])return false;return true;}
/* Full vault tree (replaces the decorative folder list inside notes()). */
function vaultTreeHtml(){
  var tree='<div class="eb">Vault</div>'+MOCK.vault.tiers.map(function(t){
    return vaultNodeHtml(t,[],0,true);
  }).join('');
  var pathStr=S.vaultPath.length?S.vaultPath.join('  <span class="sep">/</span>  '):'<span class="muted">— select a folder —</span>';
  var crumb='<div class="vpath"><span class="pl" style="background:#fff;color:var(--clay);font-weight:700">VAULT PATH</span>'+
    '<div class="vp">'+pathStr+'</div></div>';
  return '<div class="vtree">'+tree+crumb+'</div>';
}
/* Wire the tree: folder toggles (expand+select+filter list) and file opens. Call inside bind(). */
function bindVault(){
  document.querySelectorAll('[data-vdir]').forEach(function(el){el.onclick=function(){
    var key=el.getAttribute('data-vdir'),path=key.split('/');
    S.vaultExpand[key]=!S.vaultExpand[key];          // expand/collapse
    S.vaultPath=path;S.vaultIdx=0;                    // select folder → filters middle list
    var node=vaultFind(path),files=node?vaultFilesAt(node):[];
    if(files.length){S.noteIdx=0;}                    // first file becomes the open note
    repaint();
  };});
  document.querySelectorAll('[data-vfile]').forEach(function(el){el.onclick=function(){

    S.vaultPath=folder?folder.split('/'):[];

    repaint();

}

/* ============================================================
   Notes — Apple-Freeform infinite canvas (4th editor mode "Freeform") [notes-freeform]
   ============================================================ */
/* ===================== NOTES · FREEFORM CANVAS [notes-freeform] ===================== */
/* Apple-Freeform-style infinite, pannable/zoomable canvas. Pointer events on a <canvas>.
   Honors Apple Pencil pressure when pointerType==='pen' (+ coalesced events for smooth high-rate
   ink + hover preview). Pan: two-finger / space-drag / middle-button / select-tool on empty.
   Pinch & ctrl/cmd-scroll zoom. Floating tool palette. Strokes + items persisted per note in S.freeform.
   World model: screen = (world + cam) * z  ->  world = screen/z - cam. */

/* a "note" is folder + idx; freeform doc is stored per that key */
function ffKey(){return S.noteFolder+':'+S.noteIdx;}
function ffDoc(){
  var k=ffKey();
  if(!S.freeform[k]&&typeof MOCK!=='undefined'&&MOCK.freeformSeed&&MOCK.freeformSeed[k])S.freeform[k]=MOCK.freeformSeed[k]; /* optional seed */
  if(!S.freeform[k])S.freeform[k]={strokes:[],items:[],cam:{x:0,y:0,z:1}};
  if(!S.freeform[k].cam)S.freeform[k].cam={x:0,y:0,z:1};
  return S.freeform[k];
}
function ffCSS(v){try{return getComputedStyle(document.documentElement).getPropertyValue(v).trim()||'#36302A';}catch(e){return '#36302A';}}
function ffColor(tool){return tool==='highlighter'?'rgba(176,116,42,0.34)':ffCSS('--ink');}
function ffDist(a,b){var dx=a.sx-b.sx,dy=a.sy-b.sy;return Math.sqrt(dx*dx+dy*dy);}

/* HTML fragment for the freeform layer — inserted into .nedbody (see sharedEdits) */
function ffLayerHtml(){
  var tools=[['pen','✎','Pen'],['highlighter','▰','Highlighter'],['eraser','⌫','Eraser'],['select','✥','Select / move'],['sticky','▢','Sticky note'],['text','T','Text']];
  var btns=tools.map(function(t){return '<button class="fftool'+(S._ffTool===t[0]?' on':'')+'" data-fftool="'+t[0]+'" title="'+t[2]+'" aria-pressed="'+(S._ffTool===t[0])+'">'+t[1]+'</button>';}).join('');
  return '<div class="ffwrap" id="ffWrap">'+
    '<canvas id="ffCanvas" class="ffcanvas"></canvas>'+
    '<div class="ffpalette" role="toolbar" aria-label="Freeform tools">'+btns+
      '<span class="ffsep"></span>'+
      '<button class="fftool" id="ffCycle" title="Cycle tool (Pencil-squeeze fallback)">⟳</button>'+
      '<button class="fftool" id="ffZoomReset" title="Reset view">100%</button>'+
    '</div>'+
    '<div class="ffhint xs">Pen pressure · two-finger / space-drag to pan · pinch or ⌘-scroll to zoom · double-tap pen = cycle · tool: <b id="ffToolLbl">'+esc(S._ffTool)+'</b></div>'+
  '</div>';
}

/* ---- single (re)bindable entry point: call inside bind() (gated by S.view==='notes' && S.noteMode==='free') ---- */
function bindFreeform(){
  var cv=document.getElementById('ffCanvas');
  if(!cv)return;
  if(cv._ffBound)return;              /* guard: bind once per canvas element */
  cv._ffBound=true;

  var doc=ffDoc();
  var ctx=cv.getContext('2d');
  var dpr=Math.max(1,window.devicePixelRatio||1);
  var cam=doc.cam;
  var live=null;                      /* stroke being drawn */
  var pointers={};                    /* active pointers, for pinch/pan */
  var mode={pan:false,pinch:null,dragItem:null,erasing:false};
  var spaceDown=false;
  var hover=null;                     /* pen hover preview */

  function fit(){
    var r=cv.getBoundingClientRect();
    cv.width=Math.max(1,Math.round(r.width*dpr));
    cv.height=Math.max(1,Math.round(r.height*dpr));
    draw();
  }
  function localXY(e){var r=cv.getBoundingClientRect();return {sx:e.clientX-r.left,sy:e.clientY-r.top};}
  function toWorld(sx,sy){return {x:sx/cam.z-cam.x,y:sy/cam.z-cam.y};}

  function draw(){
    var w=cv.width,h=cv.height;
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,w,h);
    ctx.save();
    ctx.scale(dpr,dpr);
    drawGrid(w/dpr,h/dpr);
    ctx.restore();
    ctx.setTransform(dpr*cam.z,0,0,dpr*cam.z,dpr*cam.x*cam.z,dpr*cam.y*cam.z);
    var i;
    for(i=0;i<doc.items.length;i++)drawItem(doc.items[i]);
    for(i=0;i<doc.strokes.length;i++)drawStroke(doc.strokes[i]);
    if(live)drawStroke(live);
    if(S._ffSel)drawSelOutline(S._ffSel);
    if(hover&&S._ffTool==='pen'){
      ctx.setTransform(dpr,0,0,dpr,0,0);
      ctx.beginPath();ctx.arc(hover.sx,hover.sy,1.2+ (hover.pressure||0.3)*3.5,0,6.2832);
      ctx.strokeStyle='rgba(166,90,58,0.55)';ctx.lineWidth=1;ctx.stroke();
    }
  }
  function drawGrid(vw,vh){
    var z=cam.z,step=24*z;
    if(step<9)return;
    var ox=((cam.x*z)%step+step)%step, oy=((cam.y*z)%step+step)%step;
    ctx.fillStyle='rgba(110,102,91,0.16)';
    for(var gx=ox;gx<vw;gx+=step)for(var gy=oy;gy<vh;gy+=step){ctx.beginPath();ctx.arc(gx,gy,0.9,0,6.2832);ctx.fill();}
  }
  function drawStroke(st){
    var pts=st.pts;if(!pts||!pts.length)return;
    ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle=st.color;
    ctx.globalAlpha=st.tool==='highlighter'?0.5:1;
    if(pts.length===1){ctx.fillStyle=st.color;ctx.beginPath();ctx.arc(pts[0].x,pts[0].y,Math.max(0.4,(st.size*pts[0].p)/2),0,6.2832);ctx.fill();ctx.globalAlpha=1;return;}
    for(var i=1;i<pts.length;i++){
      var a=pts[i-1],b=pts[i];
      ctx.lineWidth=Math.max(0.4,st.size*((a.p+b.p)/2));
      var mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.quadraticCurveTo(a.x,a.y,mx,my);ctx.lineTo(b.x,b.y);ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
  function itemBox(it){return {x:it.x,y:it.y,w:(it.w||260),h:(it.h||40)};}
  function drawItem(it){
    if(it.type==='sticky'){
      ctx.fillStyle='#FBF1E2';ctx.strokeStyle='#E6DECF';ctx.lineWidth=1;
      roundRect(it.x,it.y,it.w,it.h,8);ctx.fill();ctx.stroke();
      ctx.fillStyle='#36302A';ctx.font='13px Georgia,serif';
      wrapText(it.text||'Note',it.x+10,it.y+22,it.w-20,17);
    }else{
      ctx.fillStyle='#36302A';ctx.font='15px Georgia,serif';
      wrapText(it.text||'Text',it.x,it.y+15,it.w||260,20);
    }
  }
  function drawSelOutline(it){var b=itemBox(it);ctx.strokeStyle=ffCSS('--clay');ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.strokeRect(b.x-3,b.y-3,b.w+6,b.h+6);ctx.setLineDash([]);}
  function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
  function wrapText(text,x,y,maxW,lh){
    var words=(''+text).split(/\s+/),line='',yy=y;
    for(var n=0;n<words.length;n++){var test=line+words[n]+' ';
      if(ctx.measureText(test).width>maxW&&n>0){ctx.fillText(line,x,yy);line=words[n]+' ';yy+=lh;}else line=test;}
    ctx.fillText(line,x,yy);
  }
  function hitItem(wx,wy){for(var i=doc.items.length-1;i>=0;i--){var b=itemBox(doc.items[i]);if(wx>=b.x&&wx<=b.x+b.w&&wy>=b.y&&wy<=b.y+b.h)return doc.items[i];}return null;}
  function eraseAt(wx,wy){var r=10/cam.z,changed=false;
    for(var i=doc.strokes.length-1;i>=0;i--){var pts=doc.strokes[i].pts;for(var j=0;j<pts.length;j++){if(Math.abs(pts[j].x-wx)<r&&Math.abs(pts[j].y-wy)<r){doc.strokes.splice(i,1);changed=true;break;}}}
    return changed;}

  /* ---- pointer events ---- */
  cv.addEventListener('pointerdown',function(e){
    cv.setPointerCapture&&cv.setPointerCapture(e.pointerId);
    var l=localXY(e);pointers[e.pointerId]={sx:l.sx,sy:l.sy,type:e.pointerType};
    var ids=Object.keys(pointers);
    if(ids.length===2){                 /* second finger => pinch/two-finger pan */
      live=null;mode.dragItem=null;mode.erasing=false;
      var a=pointers[ids[0]],b=pointers[ids[1]];
      mode.pinch={d:ffDist(a,b),cx:(a.sx+b.sx)/2,cy:(a.sy+b.sy)/2,z:cam.z,camx:cam.x,camy:cam.y};
      return;
    }
    var tool=S._ffTool;
    if(spaceDown||e.button===1||tool==='pan'){mode.pan={sx:l.sx,sy:l.sy,camx:cam.x,camy:cam.y};return;}
    var w=toWorld(l.sx,l.sy);
    if(tool==='select'){
      var it=hitItem(w.x,w.y);
      if(it){mode.dragItem={it:it,dx:w.x-it.x,dy:w.y-it.y};S._ffSel=it;}
      else{mode.pan={sx:l.sx,sy:l.sy,camx:cam.x,camy:cam.y};S._ffSel=null;}
      draw();return;
    }
    if(tool==='eraser'){if(eraseAt(w.x,w.y))draw();mode.erasing=true;return;}
    if(tool==='sticky'){doc.items.push({type:'sticky',x:w.x-60,y:w.y-40,w:120,h:80,text:'Note'});S._ffTool='select';persistFF();repaintFFTools();draw();return;}
    if(tool==='text'){var txt=window.prompt('Text:','');if(txt!=null&&txt.trim()){doc.items.push({type:'text',x:w.x,y:w.y,w:260,h:40,text:txt});persistFF();}S._ffTool='select';repaintFFTools();draw();return;}
    /* pen / highlighter => begin stroke */
    var press=(e.pointerType==='pen'&&e.pressure>0)?e.pressure:(e.pointerType==='touch'?0.6:0.5);
    live={tool:tool,color:ffColor(tool),size:tool==='highlighter'?14:2.4,pts:[{x:w.x,y:w.y,p:press}]};
  });

  cv.addEventListener('pointermove',function(e){
    var l=localXY(e);
    if(pointers[e.pointerId]){pointers[e.pointerId].sx=l.sx;pointers[e.pointerId].sy=l.sy;}
    if(e.pointerType==='pen'&&!live&&!mode.pan&&!mode.pinch&&!mode.dragItem){hover={sx:l.sx,sy:l.sy,pressure:e.pressure||0.3};draw();}
    if(mode.pinch){
      var ids=Object.keys(pointers);if(ids.length<2)return;
      var a=pointers[ids[0]],b=pointers[ids[1]];
      var nd=ffDist(a,b),ncx=(a.sx+b.sx)/2,ncy=(a.sy+b.sy)/2;
      var nz=Math.max(0.2,Math.min(6,mode.pinch.z*(nd/(mode.pinch.d||1))));
      var fwx=mode.pinch.cx/mode.pinch.z-mode.pinch.camx, fwy=mode.pinch.cy/mode.pinch.z-mode.pinch.camy;
      cam.z=nz;cam.x=ncx/nz-fwx;cam.y=ncy/nz-fwy;draw();return;
    }
    if(mode.pan){cam.x=mode.pan.camx+(l.sx-mode.pan.sx)/cam.z;cam.y=mode.pan.camy+(l.sy-mode.pan.sy)/cam.z;draw();return;}
    var w=toWorld(l.sx,l.sy);
    if(mode.dragItem){mode.dragItem.it.x=w.x-mode.dragItem.dx;mode.dragItem.it.y=w.y-mode.dragItem.dy;draw();return;}
    if(mode.erasing){if(eraseAt(w.x,w.y))draw();return;}
    if(live){
      var last=live.pts[live.pts.length-1].p;
      var evs=(e.getCoalescedEvents&&e.getCoalescedEvents().length)?e.getCoalescedEvents():[e];
      for(var i=0;i<evs.length;i++){var ll=localXY(evs[i]);var ww=toWorld(ll.sx,ll.sy);var pp=(evs[i].pointerType==='pen'&&evs[i].pressure>0)?evs[i].pressure:last;live.pts.push({x:ww.x,y:ww.y,p:pp});}
      draw();
    }
  });

  function endPointer(e){
    if(cv.hasPointerCapture&&cv.hasPointerCapture(e.pointerId)){try{cv.releasePointerCapture(e.pointerId);}catch(x){}}
    delete pointers[e.pointerId];
    if(Object.keys(pointers).length<2)mode.pinch=null;
    if(mode.pan&&Object.keys(pointers).length===0)mode.pan=false;
    if(mode.dragItem){mode.dragItem=null;persistFF();}
    if(mode.erasing){mode.erasing=false;persistFF();}
    if(live){if(live.pts.length)doc.strokes.push(live);live=null;persistFF();draw();}
    /* double-tap pen = cycle tool (graceful fallback: Pencil squeeze/double-tap is NOT exposed to web Safari) */
    if(e.pointerType==='pen'){var now=Date.now();if(now-(cv._ffLastTap||0)<320)cycleTool();cv._ffLastTap=now;}
  }
  cv.addEventListener('pointerup',endPointer);
  cv.addEventListener('pointercancel',endPointer);
  cv.addEventListener('pointerleave',function(e){if(e.pointerType==='pen'){hover=null;draw();}});

  cv.addEventListener('wheel',function(e){
    e.preventDefault();var l=localXY(e);
    if(e.ctrlKey||e.metaKey){var fwx=l.sx/cam.z-cam.x,fwy=l.sy/cam.z-cam.y;var nz=Math.max(0.2,Math.min(6,cam.z*(1-e.deltaY*0.01)));cam.z=nz;cam.x=l.sx/nz-fwx;cam.y=l.sy/nz-fwy;}
    else{cam.x-=e.deltaX/cam.z;cam.y-=e.deltaY/cam.z;}
    draw();
  },{passive:false});

  /* space = pan modifier; ⟳ button / double-tap cycle tools (on-canvas Pencil-squeeze fallback) */
  function keyDown(ev){if(ev.target&&(ev.target.isContentEditable||ev.target.tagName==='INPUT'))return;if(ev.code==='Space'){spaceDown=true;}}
  function keyUp(ev){if(ev.code==='Space')spaceDown=false;}
  document.addEventListener('keydown',keyDown);document.addEventListener('keyup',keyUp);

  function cycleTool(){var order=['pen','highlighter','eraser','select'];S._ffTool=order[(order.indexOf(S._ffTool)+1)%order.length];repaintFFTools();hover=null;draw();}

  /* palette wiring */
  document.querySelectorAll('[data-fftool]').forEach(function(b){b.onclick=function(){S._ffTool=b.getAttribute('data-fftool');S._ffSel=null;repaintFFTools();hover=null;draw();};});
  var cyc=document.getElementById('ffCycle');if(cyc)cyc.onclick=cycleTool;
  var zb=document.getElementById('ffZoomReset');if(zb)zb.onclick=function(){cam.z=1;cam.x=0;cam.y=0;S._ffSel=null;draw();};

  /* keep canvas sized to its container (bind once globally; checks the live canvas each time) */
  if(!window._ffResizeHooked){window._ffResizeHooked=true;window.addEventListener('resize',function(){var c=document.getElementById('ffCanvas');if(c&&c._ffFit)c._ffFit();});}
  cv._ffFit=fit;
  fit();draw();
}
function repaintFFTools(){
  document.querySelectorAll('[data-fftool]').forEach(function(b){var on=b.getAttribute('data-fftool')===S._ffTool;b.classList.toggle('on',on);b.setAttribute('aria-pressed',on);});
  var lbl=document.getElementById('ffToolLbl');if(lbl)lbl.textContent=S._ffTool;
}
function persistFF(){
  if(location.protocol.indexOf('http')!==0)return;
  try{var doc=S.freeform[ffKey()];fetch('/api/notes/freeform?folder='+encodeURIComponent(S.noteFolder)+'&idx='+S.noteIdx,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({strokes:doc.strokes,items:doc.items,cam:doc.cam})});}catch(e){}
}

/* BOOT */
loadActivity();                                  // seed S.activity from localStorage or MOCK.activity
S.approvals=(MOCK.approvals||[]).slice();         // seed the approvals queue
render(false);
connectHermes();
loadConsole();
/* polling fallback — Cloudflare Access often blocks/buffers SSE, so re-fetch the
   console every 4s while the Workspace is open (and not mid-typing) so replies show. */
setInterval(function(){if(S.view==='workspace'&&isLive()&&!isEditing())loadConsole();},4000);
if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){navigator.serviceWorker.register('/preview/sw.js').catch(function(){});}
</script>
</body>
